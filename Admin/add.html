<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Add Account — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: #f7f7f9; }
        .form-card { background: white; border-radius: 32px; border: 1px solid #efeff1; box-shadow: 0 8px 30px rgba(0,0,0,0.02); }
        .input-modern { transition: all 0.2s; border: 1px solid #eaeaef; background: #ffffff; border-radius: 14px; outline: none; }
        .input-modern:focus { border-color: #9ca3af; box-shadow: 0 0 0 3px rgba(0,0,0,0.02); }
        .btn-primary { background: #000000; transition: 0.2s; border-radius: 40px; }
        .btn-primary:hover { background: #2c2c2e; transform: translateY(-1px); }
        .chip-feature { background: #f3f4f6; border-radius: 40px; padding: 4px 12px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
        .image-preview-circle { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .image-preview-rect { width: 80px; height: 80px; object-fit: cover; border-radius: 16px; border: 1px solid #eef2f6; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body class="p-6 md:p-10">

<div class="max-w-4xl mx-auto">
    <div class="mb-6 flex items-center gap-3">
        <a href="admin.html" class="text-gray-500 hover:text-black transition p-2 rounded-full bg-white shadow-sm"><iconify-icon icon="mdi:arrow-left" width="24"></iconify-icon></a>
        <h1 class="text-3xl font-bold tracking-tight">Add New Account</h1>
    </div>

    <div class="form-card p-6 md:p-8">
        <form id="accountForm" class="space-y-6">
            <div class="grid md:grid-cols-2 gap-5">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Nickname *</label><input type="text" id="nickname" required class="input-modern w-full px-4 py-2.5 text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Current followers *</label><input type="number" id="followers" required class="input-modern w-full px-4 py-2.5 text-sm"></div>
            </div>

            <div class="grid md:grid-cols-3 gap-5">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Social Media *</label><select id="socialMedia" required class="input-modern w-full px-4 py-2.5 text-sm bg-white"><option value="Instagram">Instagram</option><option value="Linkedin">Linkedin</option><option value="Facebook">Facebook</option><option value="X(TWITTER)">X</option><option value="Tiktok">TikTok</option><option value="Youtube">YouTube</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Category *</label><select id="categorySelect" required class="input-modern w-full px-4 py-2.5 text-sm bg-white"><option value="">-- Loading --</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Country *</label><select id="countrySelect" required class="input-modern w-full px-4 py-2.5 text-sm bg-white"><option value="">-- Loading --</option></select></div>
            </div>

            <div class="border-t border-gray-100 pt-5">
                <div class="grid md:grid-cols-2 gap-5">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Original Price (USD) *</label><input type="number" id="originalPrice" step="0.01" class="input-modern w-full px-4 py-2.5 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Discount Price (USD) <span class="text-gray-400 text-xs">(optional)</span></label><input type="number" id="discountPrice" step="0.01" class="input-modern w-full px-4 py-2.5 text-sm"></div>
                </div>
                <div class="flex flex-wrap gap-6 mt-4">
                    <label class="flex items-center gap-2 text-sm text-gray-700"><input type="checkbox" id="bargainingCheck"> <span>Bargaining (price negotiable)</span></label>
                    <label class="flex items-center gap-2 text-sm text-gray-700"><input type="checkbox" id="acceptDiscountCheck"> <span>Accept Discount (override)</span></label>
                </div>
            </div>

            <div class="border-t border-gray-100 pt-5">
                <label class="block text-sm font-medium text-gray-700 mb-3">Account Images</label>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div><label class="text-xs font-semibold uppercase tracking-wide">Profile (Circle)</label><div class="mt-2"><button type="button" class="upload-trigger bg-gray-50 border border-gray-200 rounded-xl px-3 py-1.5 text-xs flex items-center gap-1 hover:bg-gray-100" data-target="profileImage"><iconify-icon icon="mdi:cloud-upload"></iconify-icon> Upload</button><input type="file" id="profileImage" accept="image/*" class="hidden-file-input hidden"><div id="profilePreviewContainer" class="mt-2"></div></div></div>
                    <div><label class="text-xs font-semibold uppercase tracking-wide">Front Image *</label><div class="mt-2"><button type="button" class="upload-trigger bg-gray-50 border border-gray-200 rounded-xl px-3 py-1.5 text-xs flex items-center gap-1 hover:bg-gray-100" data-target="frontImage"><iconify-icon icon="mdi:cloud-upload"></iconify-icon> Upload</button><input type="file" id="frontImage" accept="image/*" class="hidden-file-input hidden"><div id="frontPreviewContainer" class="mt-2"></div></div></div>
                    <div><label class="text-xs font-semibold uppercase tracking-wide">Dashboard (max 5)</label><div class="mt-2"><button type="button" class="upload-trigger bg-gray-50 border border-gray-200 rounded-xl px-3 py-1.5 text-xs flex items-center gap-1 hover:bg-gray-100" data-target="dashboardImages"><iconify-icon icon="mdi:cloud-upload-multiple"></iconify-icon> Add</button><input type="file" id="dashboardImages" accept="image/*" multiple class="hidden-file-input hidden"><div id="dashboardPreviewContainer" class="flex flex-wrap gap-2 mt-2"></div></div></div>
                </div>
                <div class="mt-4"><label class="text-xs font-semibold uppercase tracking-wide">Other Images (max 5)</label><div class="mt-2"><button type="button" class="upload-trigger bg-gray-50 border border-gray-200 rounded-xl px-3 py-1.5 text-xs flex items-center gap-1 hover:bg-gray-100" data-target="otherImages"><iconify-icon icon="mdi:image-plus"></iconify-icon> Add</button><input type="file" id="otherImages" accept="image/*" multiple class="hidden-file-input hidden"><div id="otherPreviewContainer" class="flex flex-wrap gap-2 mt-2"></div></div></div>
            </div>

            <div><label class="block text-sm font-medium text-gray-700 mb-1">Features (bullet list)</label><textarea id="featuresText" rows="3" class="input-modern w-full px-4 py-2.5 text-sm" placeholder="e.g., High engagement, Verified badge..."></textarea><div class="mt-2 flex flex-wrap gap-2" id="premadeFeaturesContainer"></div></div>

            <div class="pt-4"><button type="submit" id="submitBtn" class="btn-primary w-full md:w-auto px-8 py-3 text-white font-medium flex items-center justify-center gap-2"><iconify-icon icon="mdi:cloud-upload" width="18"></iconify-icon> Create Account</button></div>
            <div id="formMessage" class="text-sm"></div>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDoc, getDocs, doc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBAJBge8NM51f7IvwaE5X1fXsC8H-0Tlv0",
        authDomain: "project-k21n.firebaseapp.com",
        projectId: "project-k21n",
        storageBucket: "project-k21n.firebasestorage.app",
        messagingSenderId: "266081318769",
        appId: "1:266081318769:web:a7893c55b5b30a8dd768d0"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const IMGBB_KEY = "ba8023ca74166460c442e8e703d2a1b0";

    async function uploadToImgBB(file) { if(!file) return null; const fd = new FormData(); fd.append("image", file); const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd }); const data = await res.json(); return data.success ? data.data.url : null; }

    document.querySelectorAll('.upload-trigger').forEach(btn => { btn.addEventListener('click', () => { const targetId = btn.getAttribute('data-target'); document.getElementById(targetId)?.click(); }); });

    function setupPreview(inputId, containerId, isCircle = false, multiple = false) {
        const input = document.getElementById(inputId); if(!input) return;
        input.addEventListener('change', (e) => { const container = document.getElementById(containerId); if(!container) return; if(!multiple) container.innerHTML = ''; const files = Array.from(e.target.files); if(!multiple && files[0]) { const reader = new FileReader(); reader.onload = (ev) => { const img = document.createElement('img'); img.src = ev.target.result; img.className = isCircle ? 'image-preview-circle' : 'image-preview-rect'; container.innerHTML = ''; container.appendChild(img); }; reader.readAsDataURL(files[0]); } else if(multiple) { files.slice(0,5).forEach(file => { const reader = new FileReader(); reader.onload = (ev) => { const img = document.createElement('img'); img.src = ev.target.result; img.className = 'image-preview-rect'; container.appendChild(img); }; reader.readAsDataURL(file); }); } });
    }
    setupPreview('profileImage', 'profilePreviewContainer', true, false);
    setupPreview('frontImage', 'frontPreviewContainer', false, false);
    setupPreview('dashboardImages', 'dashboardPreviewContainer', false, true);
    setupPreview('otherImages', 'otherPreviewContainer', false, true);

    let categoriesArray = [], countriesArray = [], premadeFeaturesArray = [];
    
    async function fetchSettings() { 
        try { 
            const settingsDoc = await getDoc(doc(db, 'adminSettings', 'config'));
            if(settingsDoc.exists()) { 
                const data = settingsDoc.data(); 
                countriesArray = data.countries || []; 
                categoriesArray = data.categories || []; 
                premadeFeaturesArray = data.premadeFeatures || []; 
            } else {
                countriesArray = []; categoriesArray = []; premadeFeaturesArray = [];
                await setDoc(doc(db, 'adminSettings', 'config'), { countries: [], categories: [], premadeFeatures: [] });
            }
            populateSelects(); 
            renderPremadeFeatures(); 
        } catch(e) { console.error(e); } 
    }
    
    function populateSelects() { 
        const catSel = document.getElementById('categorySelect'); 
        const countrySel = document.getElementById('countrySelect'); 
        if(catSel) catSel.innerHTML = categoriesArray.length ? categoriesArray.map(c => `<option value="${c}">${c}</option>`).join('') : '<option>General</option>'; 
        if(countrySel) countrySel.innerHTML = countriesArray.length ? countriesArray.map(c => `<option value="${c}">${c}</option>`).join('') : '<option>Global</option>'; 
    }
    
    function renderPremadeFeatures() { 
        const container = document.getElementById('premadeFeaturesContainer'); 
        if(container) { 
            container.innerHTML = premadeFeaturesArray.map(f => `<span class="chip-feature" data-feat="${f.replace(/"/g, '&quot;')}">+ ${f}</span>`).join(''); 
            document.querySelectorAll('#premadeFeaturesContainer .chip-feature').forEach(el => { 
                el.addEventListener('click', () => { 
                    const ta = document.getElementById('featuresText'); 
                    let val = ta.value; 
                    if(val && !val.endsWith('\n')) val += '\n'; 
                    ta.value = val + `• ${el.getAttribute('data-feat') || el.innerText.replace('+ ', '')}`; 
                }); 
            }); 
        } 
    }

    document.getElementById('accountForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nickname = document.getElementById('nickname').value.trim();
        const followers = document.getElementById('followers').value;
        const socialMedia = document.getElementById('socialMedia').value;
        const category = document.getElementById('categorySelect').value;
        const country = document.getElementById('countrySelect').value;
        const originalPrice = parseFloat(document.getElementById('originalPrice').value);
        let discountPrice = document.getElementById('discountPrice').value ? parseFloat(document.getElementById('discountPrice').value) : null;
        const bargaining = document.getElementById('bargainingCheck').checked;
        const acceptDiscount = document.getElementById('acceptDiscountCheck').checked;
        
        if(!nickname || !followers || !originalPrice) { document.getElementById('formMessage').innerHTML = '<span class="text-red-500">❌ Required fields missing</span>'; return; }
        const frontFile = document.getElementById('frontImage').files[0];
        if(!frontFile) { document.getElementById('formMessage').innerHTML = '<span class="text-red-500">❌ Front image required</span>'; return; }
        
        document.getElementById('submitBtn').disabled = true; 
        document.getElementById('submitBtn').innerHTML = '<iconify-icon icon="mdi:loading" class="animate-spin"></iconify-icon> Creating...';
        const loadingDiv = document.createElement('div'); loadingDiv.className = 'loading-overlay'; loadingDiv.innerHTML = '<div class="bg-white rounded-2xl p-4 shadow-xl"><iconify-icon icon="line-md:uploading-loop" width="28"></iconify-icon><span>Uploading...</span></div>'; document.body.appendChild(loadingDiv);
        
        try {
            const profileFile = document.getElementById('profileImage').files[0];
            const dashboardFiles = Array.from(document.getElementById('dashboardImages').files || []);
            const otherFiles = Array.from(document.getElementById('otherImages').files || []);
            const [profileUrl, frontUrl] = await Promise.all([profileFile ? uploadToImgBB(profileFile) : null, uploadToImgBB(frontFile)]);
            const dashboardUrls = await Promise.all(dashboardFiles.map(f => uploadToImgBB(f)));
            const otherUrls = await Promise.all(otherFiles.map(f => uploadToImgBB(f)));
            
            let finalPrice = originalPrice, hasDiscount = false;
            if(!bargaining) { if((acceptDiscount && discountPrice) || (!acceptDiscount && discountPrice && discountPrice > 0)) { finalPrice = discountPrice; hasDiscount = true; } else { finalPrice = originalPrice; } }
            
            const featuresRaw = document.getElementById('featuresText').value;
            const featuresList = featuresRaw.split('\n').filter(l => l.trim()).map(l => l.replace(/^•\s*/, '').trim());
            
            const accountData = { 
                nickname, followers: parseInt(followers), socialMedia, category, country, 
                originalPrice, discountPrice: discountPrice || null, bargaining, acceptDiscount, 
                finalPrice: bargaining ? null : finalPrice, hasDiscount: hasDiscount && !bargaining, 
                status: 'active', createdAt: new Date().toISOString(),
                images: { profile: profileUrl, front: frontUrl, dashboard: dashboardUrls, other: otherUrls }, 
                features: featuresList
            };
            
            const docRef = await addDoc(collection(db, 'marketplaceAccounts'), accountData);
            document.getElementById('formMessage').innerHTML = `<span class="text-emerald-600 text-sm">✅ Account created! ID: ${docRef.id} <a href="admin.html" class="underline">Back to dashboard</a></span>`;
            document.getElementById('accountForm').reset();
            document.querySelectorAll('#profilePreviewContainer, #frontPreviewContainer, #dashboardPreviewContainer, #otherPreviewContainer').forEach(el => el.innerHTML = '');
        } catch(err) { 
            document.getElementById('formMessage').innerHTML = `<span class="text-red-500">❌ ${err.message}</span>`; 
        } finally { 
            document.getElementById('submitBtn').disabled = false; 
            document.getElementById('submitBtn').innerHTML = '<iconify-icon icon="mdi:cloud-upload" width="18"></iconify-icon> Create Account'; 
            loadingDiv.remove(); 
        }
    });
    
    fetchSettings();
</script>
</body>
</html>
