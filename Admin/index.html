<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Secure Access</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
* { font-family: 'Poppins', sans-serif; }
body { background: #f7f7f9; }

.card {
    background: white;
    border-radius: 28px;
    border: 1px solid #efeff1;
    box-shadow: 0 8px 30px rgba(0,0,0,0.04);
}

.input-modern {
    border: 1px solid #eaeaef;
    border-radius: 14px;
    transition: 0.2s;
}
.input-modern:focus {
    border-color: #9ca3af;
    outline: none;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.03);
}

.btn-primary {
    background: black;
    border-radius: 40px;
    transition: 0.2s;
}
.btn-primary:hover {
    background: #2c2c2e;
    transform: translateY(-1px);
}

.scene {
    width: 60px;
    height: 60px;
    perspective: 600px;
    margin: auto;
}

.cube {
    width: 60px;
    height: 60px;
    position: relative;
    transform-style: preserve-3d;
    animation: rotateCube 5s infinite linear;
}

.face {
    position: absolute;
    width: 60px;
    height: 60px;
    background: black;
    opacity: 0.9;
    border-radius: 10px;
}

.front  { transform: rotateY(0deg) translateZ(30px); }
.back   { transform: rotateY(180deg) translateZ(30px); }
.right  { transform: rotateY(90deg) translateZ(30px); }
.left   { transform: rotateY(-90deg) translateZ(30px); }
.top    { transform: rotateX(90deg) translateZ(30px); }
.bottom { transform: rotateX(-90deg) translateZ(30px); }

@keyframes rotateCube {
    0% { transform: rotateX(0) rotateY(0); }
    100% { transform: rotateX(360deg) rotateY(360deg); }
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen px-4">

<div class="card p-8 w-full max-w-md text-center">

    <div class="scene mb-5">
        <div class="cube">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face right"></div>
            <div class="face left"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
        </div>
    </div>

    <h2 class="text-xl font-semibold text-gray-800">Admin Access</h2>
    <p class="text-gray-400 text-sm mt-1">Enter password</p>

    <div class="relative mt-6">
        <input 
            type="password" 
            id="passwordInput"
            placeholder="Password"
            class="input-modern w-full px-4 py-3 text-center text-lg tracking-wider pr-12"
        >

        <button 
            id="togglePassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"
        >
            👁
        </button>
    </div>

    <button 
        id="loginBtn"
        class="btn-primary w-full mt-5 py-3 text-white font-medium"
    >
        Unlock
    </button>

    <p id="errorMsg" class="text-red-500 text-xs mt-3 hidden">Wrong password</p>
</div>

<script>
const _p1 = atob("TVJraWRkYUA=");
const _p2 = (6 * 2).toString();
const hiddenPassword = _p1 + _p2;

document.getElementById("loginBtn").addEventListener("click", () => {
    const input = document.getElementById("passwordInput").value;

    if (input === hiddenPassword) {
        sessionStorage.setItem("auth", "true");
        window.location.href = "dashboard.html";
    } else {
        document.getElementById("errorMsg").classList.remove("hidden");
    }
});

document.getElementById("passwordInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") document.getElementById("loginBtn").click();
});

document.getElementById("togglePassword").addEventListener("click", () => {
    const input = document.getElementById("passwordInput");
    input.type = input.type === "password" ? "text" : "password";
});
</script>

</body>
</html>
