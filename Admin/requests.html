<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Seller Requests — Imbuga Store | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: #0a0c10; color: #eef2ff; }
        
        /* Dark Theme Card */
        .request-card {
            background: #11161c;
            border: 1px solid #2a2f36;
            border-radius: 24px;
            transition: all 0.2s ease;
        }
        .request-card:hover {
            border-color: #4a5568;
            transform: translateY(-2px);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-pending { background: #f59e0b20; color: #fbbf24; border: 1px solid #f59e0b40; }
        .status-approved { background: #10b98120; color: #34d399; border: 1px solid #10b98140; }
        .status-rejected { background: #ef444420; color: #f87171; border: 1px solid #ef444440; }
        
        .filter-btn {
            transition: all 0.2s;
            cursor: pointer;
        }
        .filter-active {
            background: #1f2937;
            color: white;
            border-color: #4a5568;
        }
        .filter-inactive {
            background: transparent;
            color: #9ca3af;
            border-color: #2a2f38;
        }
        .filter-inactive:hover {
            background: #1a202c;
            color: #e5e7eb;
        }
        
        .image-preview-sm {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #2a2f38;
            cursor: pointer;
            transition: all 0.2s;
        }
        .image-preview-sm:hover {
            transform: scale(1.05);
            border-color: #6b7280;
        }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        
        .btn-primary {
            background: #1f2937;
            border: 1px solid #374151;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: #2d3a4b;
            transform: translateY(-1px);
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <!-- Header -->
    <div class="flex flex-wrap justify-between items-center gap-4 mb-8 pb-4 border-b border-gray-800">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                <iconify-icon icon="ri:exchange-dollar-line" width="22" class="text-black"></iconify-icon>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold text-white">Seller Requests</h1>
        </div>
        <a href="admin.html" class="text-gray-400 hover:text-white transition flex items-center gap-2 text-sm">
            <iconify-icon icon="mdi:arrow-left" width="16"></iconify-icon>
            Back to Admin
        </a>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-gray-800/40 rounded-2xl p-4 border border-gray-700">
            <p class="text-xs text-gray-400 uppercase tracking-wide">Total Requests</p>
            <p id="totalCount" class="text-2xl font-bold text-white mt-1">0</p>
        </div>
        <div class="bg-gray-800/40 rounded-2xl p-4 border border-gray-700">
            <p class="text-xs text-gray-400 uppercase tracking-wide">Pending</p>
            <p id="pendingCount" class="text-2xl font-bold text-yellow-400 mt-1">0</p>
        </div>
        <div class="bg-gray-800/40 rounded-2xl p-4 border border-gray-700">
            <p class="text-xs text-gray-400 uppercase tracking-wide">Approved</p>
            <p id="approvedCount" class="text-2xl font-bold text-green-400 mt-1">0</p>
        </div>
        <div class="bg-gray-800/40 rounded-2xl p-4 border border-gray-700">
            <p class="text-xs text-gray-400 uppercase tracking-wide">Rejected</p>
            <p id="rejectedCount" class="text-2xl font-bold text-red-400 mt-1">0</p>
        </div>
    </div>

    <!-- Filter Tabs -->
    <div class="flex flex-wrap gap-2 mb-6">
        <button data-filter="all" class="filter-btn filter-active px-5 py-2 rounded-full text-sm font-medium border transition-all">All Requests</button>
        <button data-filter="pending" class="filter-btn filter-inactive px-5 py-2 rounded-full text-sm font-medium border transition-all">Pending</button>
        <button data-filter="approved" class="filter-btn filter-inactive px-5 py-2 rounded-full text-sm font-medium border transition-all">Approved</button>
        <button data-filter="rejected" class="filter-btn filter-inactive px-5 py-2 rounded-full text-sm font-medium border transition-all">Rejected</button>
    </div>

    <!-- Search Bar -->
    <div class="mb-6">
        <div class="relative max-w-md">
            <iconify-icon icon="mdi:magnify" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500" width="18"></iconify-icon>
            <input type="text" id="searchInput" placeholder="Search by seller name, username, or WhatsApp..." class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-700 bg-black/40 text-white focus:border-white focus:outline-none text-sm">
        </div>
    </div>

    <!-- Requests List -->
    <div id="requestsContainer" class="space-y-4 pb-12">
        <div class="text-center py-12 text-gray-500">Loading requests...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBAJBge8NM51f7IvwaE5X1fXsC8H-0Tlv0",
        authDomain: "project-k21n.firebaseapp.com",
        projectId: "project-k21n",
        storageBucket: "project-k21n.firebasestorage.app",
        messagingSenderId: "266081318769",
        appId: "1:266081318769:web:a7893c55b5b30a8dd768d0"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let allRequests = [];
    let currentFilter = 'all';
    let searchTerm = '';
    
    // Load requests from Firestore
    async function loadRequests() {
        try {
            const q = query(collection(db, 'sellerRequests'), orderBy('createdAt', 'desc'));
            const querySnapshot = await getDocs(q);
            allRequests = [];
            querySnapshot.forEach(doc => {
                allRequests.push({ id: doc.id, ...doc.data() });
            });
            updateStats();
            renderRequests();
        } catch (error) {
            console.error('Error loading requests:', error);
            document.getElementById('requestsContainer').innerHTML = '<div class="text-center py-12 text-red-400">❌ Failed to load requests. Please refresh.</div>';
        }
    }
    
    function updateStats() {
        const total = allRequests.length;
        const pending = allRequests.filter(r => r.status === 'pending').length;
        const approved = allRequests.filter(r => r.status === 'approved').length;
        const rejected = allRequests.filter(r => r.status === 'rejected').length;
        
        document.getElementById('totalCount').innerText = total;
        document.getElementById('pendingCount').innerText = pending;
        document.getElementById('approvedCount').innerText = approved;
        document.getElementById('rejectedCount').innerText = rejected;
    }
    
    function renderRequests() {
        let filtered = allRequests;
        
        // Apply status filter
        if (currentFilter !== 'all') {
            filtered = filtered.filter(r => r.status === currentFilter);
        }
        
        // Apply search filter
        if (searchTerm) {
            const term = searchTerm.toLowerCase();
            filtered = filtered.filter(r => 
                (r.sellerName && r.sellerName.toLowerCase().includes(term)) ||
                (r.accountUsername && r.accountUsername.toLowerCase().includes(term)) ||
                (r.sellerWhatsapp && r.sellerWhatsapp.includes(term))
            );
        }
        
        const container = document.getElementById('requestsContainer');
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="text-center py-16">
                    <iconify-icon icon="mdi:inbox-outline" width="48" class="text-gray-600 mx-auto mb-3"></iconify-icon>
                    <p class="text-gray-500">No seller requests found</p>
                    <p class="text-gray-600 text-sm mt-1">New requests will appear here when sellers submit their accounts</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = filtered.map(req => {
            const statusClass = req.status === 'pending' ? 'status-pending' : (req.status === 'approved' ? 'status-approved' : 'status-rejected');
            const statusIcon = req.status === 'pending' ? 'mdi:clock-outline' : (req.status === 'approved' ? 'mdi:check-circle' : 'mdi:close-circle');
            const statusText = req.status === 'pending' ? 'Pending Review' : (req.status === 'approved' ? 'Approved' : 'Rejected');
            
            const createdAt = req.createdAt ? new Date(req.createdAt).toLocaleDateString() : 'Unknown date';
            
            return `
                <div class="request-card p-5 md:p-6" data-id="${req.id}">
                    <div class="flex flex-wrap justify-between items-start gap-4 mb-4">
                        <div>
                            <div class="flex items-center gap-3 flex-wrap">
                                <h3 class="text-lg font-semibold text-white">${escapeHtml(req.sellerName || 'Anonymous')}</h3>
                                <span class="status-badge ${statusClass}">
                                    <iconify-icon icon="${statusIcon}" width="14"></iconify-icon>
                                    ${statusText}
                                </span>
                            </div>
                            <div class="flex flex-wrap gap-3 mt-2 text-sm text-gray-400">
                                <span class="flex items-center gap-1"><iconify-icon icon="mdi:whatsapp" width="14"></iconify-icon> ${escapeHtml(req.sellerWhatsapp || 'N/A')}</span>
                                <span class="flex items-center gap-1"><iconify-icon icon="mdi:map-marker" width="14"></iconify-icon> ${escapeHtml(req.sellerAddress || 'N/A')}</span>
                                <span class="flex items-center gap-1"><iconify-icon icon="mdi:calendar" width="14"></iconify-icon> ${createdAt}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-bold text-emerald-400">$${req.askingPrice?.toLocaleString() || 0}</p>
                            <p class="text-xs text-gray-500">Asking Price</p>
                        </div>
                    </div>
                    
                    <div class="grid md:grid-cols-2 gap-4 mb-4 p-4 bg-gray-800/30 rounded-xl border border-gray-700">
                        <div>
                            <p class="text-xs text-gray-400 uppercase tracking-wide">Account Details</p>
                            <p class="text-white font-medium mt-1">${escapeHtml(req.accountUsername || 'N/A')}</p>
                            <p class="text-sm text-gray-400 break-all">${escapeHtml(req.accountLink || 'N/A')}</p>
                            <p class="text-sm text-gray-300 mt-1"><span class="text-gray-500">Platform:</span> ${escapeHtml(req.socialMediaPlatform || 'Not specified')}</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 uppercase tracking-wide">Verification Images</p>
                            <div class="flex gap-2 mt-2 flex-wrap">
                                ${req.followersImage ? `<img src="${req.followersImage}" class="image-preview-sm" onclick="openImageModal('${req.followersImage}')" loading="lazy">` : ''}
                                ${req.dashboardImages?.map(img => `<img src="${img}" class="image-preview-sm" onclick="openImageModal('${img}')" loading="lazy">`).join('') || ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex flex-wrap gap-3">
                        ${req.status !== 'approved' ? `
                            <button class="approve-btn bg-green-600/20 text-green-400 border border-green-600/50 px-5 py-2 rounded-xl text-sm font-medium hover:bg-green-600/30 transition flex items-center gap-2" data-id="${req.id}">
                                <iconify-icon icon="mdi:check" width="16"></iconify-icon> Approve
                            </button>
                        ` : ''}
                        ${req.status !== 'rejected' ? `
                            <button class="reject-btn bg-red-600/20 text-red-400 border border-red-600/50 px-5 py-2 rounded-xl text-sm font-medium hover:bg-red-600/30 transition flex items-center gap-2" data-id="${req.id}">
                                <iconify-icon icon="mdi:close" width="16"></iconify-icon> Reject
                            </button>
                        ` : ''}
                        <button class="delete-btn bg-gray-700/50 text-gray-300 border border-gray-600 px-5 py-2 rounded-xl text-sm font-medium hover:bg-red-600/30 hover:text-red-400 transition flex items-center gap-2" data-id="${req.id}">
                            <iconify-icon icon="mdi:delete" width="16"></iconify-icon> Delete
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        
        // Attach event listeners to buttons
        document.querySelectorAll('.approve-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (confirm('Approve this request? The seller will be notified.')) {
                    await updateDoc(doc(db, 'sellerRequests', id), { status: 'approved', reviewedAt: new Date().toISOString() });
                    await loadRequests();
                }
            });
        });
        
        document.querySelectorAll('.reject-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (confirm('Reject this request? The seller will be notified.')) {
                    await updateDoc(doc(db, 'sellerRequests', id), { status: 'rejected', reviewedAt: new Date().toISOString() });
                    await loadRequests();
                }
            });
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (confirm('⚠️ Permanently delete this request? This action cannot be undone.')) {
                    await deleteDoc(doc(db, 'sellerRequests', id));
                    await loadRequests();
                }
            });
        });
    }
    
    // Image modal for full-size preview
    window.openImageModal = (url) => {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<img src="${url}" alt="Full size"><div class="absolute top-4 right-4 text-white text-3xl cursor-pointer bg-black/50 rounded-full p-2">&times;</div>`;
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.remove();
        });
        modal.querySelector('.absolute')?.addEventListener('click', () => modal.remove());
        document.body.appendChild(modal);
    };
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Filter event listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('filter-active');
                b.classList.add('filter-inactive');
            });
            btn.classList.remove('filter-inactive');
            btn.classList.add('filter-active');
            currentFilter = btn.getAttribute('data-filter');
            renderRequests();
        });
    });
    
    document.getElementById('searchInput')?.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderRequests();
    });
    
    // Load everything
    loadRequests();
</script>
</body>
</html>
