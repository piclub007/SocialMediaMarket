<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Edit Account — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: #f7f7f9; }
        .form-card { background: white; border-radius: 32px; border: 1px solid #efeff1; }
        .input-modern { transition: all 0.2s; border: 1px solid #eaeaef; background: #ffffff; border-radius: 14px; outline: none; }
        .input-modern:focus { border-color: #9ca3af; box-shadow: 0 0 0 3px rgba(0,0,0,0.02); }
        .btn-primary { background: #000000; transition: 0.2s; border-radius: 40px; }
        .btn-primary:hover { background: #2c2c2e; }
        .chip-feature { background: #f3f4f6; border-radius: 40px; padding: 4px 12px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
        .image-preview-circle { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        .image-preview-rect { width: 80px; height: 80px; object-fit: cover; border-radius: 16px; border: 1px solid #eef2f6; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .doc-id-badge { background: #f1f5f9; font-family: monospace; font-size: 12px; padding: 6px 12px; border-radius: 20px; word-break: break-all; }
    </style>
</head>
<body class="p-6 md:p-10">

<div class="max-w-4xl mx-auto">
    <div class="mb-6 flex items-center gap-3 flex-wrap justify-between">
        <div class="flex items-center gap-3"><a href="admin.html" class="text-gray-500 hover:text-black p-2 rounded-full bg-white shadow-sm"><iconify-icon icon="mdi:arrow-left" width="24"></iconify-icon></a><h1 class="text-3xl font-bold tracking-tight">Edit Account</h1></div>
        <div id="docIdDisplay" class="doc-id-badge bg-gray-100"><iconify-icon icon="mdi:identifier" width="14" class="inline mr-1"></iconify-icon> Loading...</div>
    </div>

    <div id="loadingState" class="text-center py-12"><iconify-icon icon="mdi:loading" class="animate-spin text-4xl mx-auto"></iconify-icon><p class="mt-3 text-gray-500">Loading account data...</p></div>
    
    <div id="editFormContainer" class="hidden">
        <div class="form-card p-6 md:p-8">
            <form id="accountForm" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-5">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Nickname *</label><input type="text" id="nickname" required class="input-modern w-full px-4 py-2.5 text-sm"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Current followers *</label><input type="number" id="followers" required class="input-modern w-full px-4 py-2.5 text-sm"></div>
                </div>

                <div class="grid md:grid-cols-3 gap-5">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Social Media</label><select id="socialMedia" class="input-modern w-full px-4 py-2.5 text-sm bg-white"><option>Instagram</option><option>Linkedin</option><option>Tiktok</option><option>Youtube</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Category</label><select id="categorySelect" class="input-modern w-full px-4 py-2.5 text-sm bg-white"></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Country</label><select id="countrySelect" class="input-modern w-full px-4 py-2.5 text-sm bg-white"></select></div>
                </div>

                <div class="border-t border-gray-100 pt-5">
                    <div class="grid md:grid-cols-2 gap-5">
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Original Price (USD)</label><input type="number" id="originalPrice" step="0.01" class="input-modern w-full px-4 py-2.5 text-sm"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Discount Price (USD)</label><input type="number" id="discountPrice" step="0.01" class="input-modern w-full px-4 py-2.5 text-sm"></div>
                    </div>
                    <div class="flex flex-wrap gap-6 mt-4">
                        <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="bargainingCheck"> Bargaining</label>
                        <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="acceptDiscountCheck"> Accept Discount</label>
                    </div>
                </div>

                <div><label class="block text-sm font-medium text-gray-700 mb-3">Images</label>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div><label class="text-xs">Profile</label><button type="button" class="upload-trigger bg-gray-50 border rounded-xl px-3 py-1 text-xs mt-1" data-target="profileImage"><iconify-icon icon="mdi:cloud-upload"></iconify-icon> Change</button><input type="file" id="profileImage" accept="image/*" class="hidden"><div id="profilePreviewContainer" class="mt-2"></div></div>
                        <div><label class="text-xs">Front Image</label><button type="button" class="upload-trigger bg-gray-50 border rounded-xl px-3 py-1 text-xs mt-1" data-target="frontImage"><iconify-icon icon="mdi:cloud-upload"></iconify-icon> Change</button><input type="file" id="frontImage" accept="image/*" class="hidden"><div id="frontPreviewContainer" class="mt-2"></div></div>
                        <div><label class="text-xs">Dashboard (max 5)</label><button type="button" class="upload-trigger bg-gray-50 border rounded-xl px-3 py-1 text-xs mt-1" data-target="dashboardImages"><iconify-icon icon="mdi:cloud-upload-multiple"></iconify-icon> Add</button><input type="file" id="dashboardImages" accept="image/*" multiple class="hidden"><div id="dashboardPreviewContainer" class="flex flex-wrap gap-2 mt-2"></div></div>
                    </div>
                    <div class="mt-3"><label class="text-xs">Other Images (max 5)</label><button type="button" class="upload-trigger bg-gray-50 border rounded-xl px-3 py-1 text-xs mt-1 ml-2" data-target="otherImages"><iconify-icon icon="mdi:image-plus"></iconify-icon> Add</button><input type="file" id="otherImages" accept="image/*" multiple class="hidden"><div id="otherPreviewContainer" class="flex flex-wrap gap-2 mt-2"></div></div>
                </div>

                <div><label class="block text-sm font-medium text-gray-700 mb-1">Features (bullet list)</label><textarea id="featuresText" rows="3" class="input-modern w-full px-4 py-2.5 text-sm" placeholder="One feature per line with bullet •"></textarea><div class="mt-2 flex flex-wrap gap-2" id="premadeFeaturesContainer"></div></div>

                <div class="pt-4 flex gap-3"><button type="submit" id="submitBtn" class="btn-primary px-8 py-3 text-white font-medium flex items-center gap-2"><iconify-icon icon="mdi:content-save" width="18"></iconify-icon> Save Changes</button><button type="button" id="deleteBtn" class="border border-red-300 text-red-600 px-6 py-3 rounded-xl hover:bg-red-50 transition">Delete Account</button></div>
                <div id="formMessage" class="text-sm"></div>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBAJBge8NM51f7IvwaE5X1fXsC8H-0Tlv0",
        authDomain: "project-k21n.firebaseapp.com",
        projectId: "project-k21n",
        storageBucket: "project-k21n.firebasestorage.app",
        messagingSenderId: "266081318769",
        appId: "1:266081318769:web:a7893c55b5b30a8dd768d0"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const IMGBB_KEY = "ba8023ca74166460c442e8e703d2a1b0";

    const urlParams = new URLSearchParams(window.location.search);
    const accountId = urlParams.get('id');
    if(!accountId) { window.location.href = 'admin.html'; }

    let currentData = {};
    let categoriesArray = [], countriesArray = [], premadeFeaturesArray = [];

    async function uploadToImgBB(file) { if(!file) return null; const fd = new FormData(); fd.append("image", file); const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd }); const data = await res.json(); return data.success ? data.data.url : null; }

    async function loadAccount() {
        const accountRef = doc(db, 'marketplaceAccounts', accountId);
        const snapshot = await getDoc(accountRef);
        if(!snapshot.exists()) { alert('Account not found'); window.location.href = 'admin.html'; return; }
        currentData = snapshot.data();
        document.getElementById('docIdDisplay').innerHTML = `<iconify-icon icon="mdi:identifier" width="14" class="inline mr-1"></iconify-icon> ID: ${accountId}`;
        document.getElementById('nickname').value = currentData.nickname || '';
        document.getElementById('followers').value = currentData.followers || '';
        document.getElementById('socialMedia').value = currentData.socialMedia || 'Instagram';
        document.getElementById('originalPrice').value = currentData.originalPrice || '';
        document.getElementById('discountPrice').value = currentData.discountPrice || '';
        document.getElementById('bargainingCheck').checked = currentData.bargaining || false;
        document.getElementById('acceptDiscountCheck').checked = currentData.acceptDiscount || false;
        document.getElementById('featuresText').value = (currentData.features || []).map(f => `• ${f}`).join('\n');
        if(currentData.images?.profile) showExistingImage(currentData.images.profile, 'profilePreviewContainer', true);
        if(currentData.images?.front) showExistingImage(currentData.images.front, 'frontPreviewContainer', false);
        if(currentData.images?.dashboard) currentData.images.dashboard.forEach(url => showExistingImage(url, 'dashboardPreviewContainer', false));
        if(currentData.images?.other) currentData.images.other.forEach(url => showExistingImage(url, 'otherPreviewContainer', false));
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('editFormContainer').classList.remove('hidden');
    }
    
    function showExistingImage(url, containerId, isCircle) { const container = document.getElementById(containerId); if(container) { const img = document.createElement('img'); img.src = url; img.className = isCircle ? 'image-preview-circle' : 'image-preview-rect'; container.appendChild(img); } }

    async function fetchSettings() { 
        try { 
            const settingsDoc = await getDoc(doc(db, 'adminSettings', 'config'));
            if(settingsDoc.exists()) { 
                const data = settingsDoc.data(); 
                countriesArray = data.countries || []; 
                categoriesArray = data.categories || []; 
                premadeFeaturesArray = data.premadeFeatures || []; 
            } else {
                countriesArray = []; categoriesArray = []; premadeFeaturesArray = [];
                await setDoc(doc(db, 'adminSettings', 'config'), { countries: [], categories: [], premadeFeatures: [] });
            }
            populateSelects(); 
            renderPremadeFeatures(); 
        } catch(e) { console.error(e); } 
    }
    
    function populateSelects() { 
        const catSel = document.getElementById('categorySelect'); 
        const countrySel = document.getElementById('countrySelect'); 
        if(catSel) catSel.innerHTML = categoriesArray.length ? categoriesArray.map(c => `<option value="${c}" ${currentData.category === c ? 'selected' : ''}>${c}</option>`).join('') : '<option>General</option>'; 
        if(countrySel) countrySel.innerHTML = countriesArray.length ? countriesArray.map(c => `<option value="${c}" ${currentData.country === c ? 'selected' : ''}>${c}</option>`).join('') : '<option>Global</option>'; 
    }
    
    function renderPremadeFeatures() { 
        const container = document.getElementById('premadeFeaturesContainer'); 
        if(container) { 
            container.innerHTML = premadeFeaturesArray.map(f => `<span class="chip-feature" data-feat="${f.replace(/"/g, '&quot;')}">+ ${f}</span>`).join(''); 
            document.querySelectorAll('#premadeFeaturesContainer .chip-feature').forEach(el => { 
                el.addEventListener('click', () => { 
                    const ta = document.getElementById('featuresText'); 
                    let val = ta.value; 
                    if(val && !val.endsWith('\n')) val += '\n'; 
                    ta.value = val + `• ${el.getAttribute('data-feat')}`; 
                }); 
            }); 
        } 
    }

    document.querySelectorAll('.upload-trigger').forEach(btn => { btn.addEventListener('click', () => { const targetId = btn.getAttribute('data-target'); document.getElementById(targetId)?.click(); }); });
    
    function setupPreview(inputId, containerId, isCircle = false, multiple = false) { 
        const input = document.getElementById(inputId); if(!input) return; 
        input.addEventListener('change', (e) => { const container = document.getElementById(containerId); if(!container) return; if(!multiple) container.innerHTML = ''; const files = Array.from(e.target.files); if(!multiple && files[0]) { const reader = new FileReader(); reader.onload = (ev) => { const img = document.createElement('img'); img.src = ev.target.result; img.className = isCircle ? 'image-preview-circle' : 'image-preview-rect'; container.innerHTML = ''; container.appendChild(img); }; reader.readAsDataURL(files[0]); } else if(multiple) { files.slice(0,5).forEach(file => { const reader = new FileReader(); reader.onload = (ev) => { const img = document.createElement('img'); img.src = ev.target.result; img.className = 'image-preview-rect'; container.appendChild(img); }; reader.readAsDataURL(file); }); } }); 
    }
    setupPreview('profileImage', 'profilePreviewContainer', true, false); 
    setupPreview('frontImage', 'frontPreviewContainer', false, false); 
    setupPreview('dashboardImages', 'dashboardPreviewContainer', false, true); 
    setupPreview('otherImages', 'otherPreviewContainer', false, true);

    document.getElementById('accountForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const updatedData = { 
            nickname: document.getElementById('nickname').value, 
            followers: parseInt(document.getElementById('followers').value), 
            socialMedia: document.getElementById('socialMedia').value, 
            category: document.getElementById('categorySelect').value, 
            country: document.getElementById('countrySelect').value, 
            originalPrice: parseFloat(document.getElementById('originalPrice').value), 
            discountPrice: document.getElementById('discountPrice').value ? parseFloat(document.getElementById('discountPrice').value) : null, 
            bargaining: document.getElementById('bargainingCheck').checked, 
            acceptDiscount: document.getElementById('acceptDiscountCheck').checked,
            updatedAt: new Date().toISOString()
        };
        
        let finalPrice = updatedData.originalPrice, hasDiscount = false;
        if(!updatedData.bargaining) { 
            if((updatedData.acceptDiscount && updatedData.discountPrice) || (!updatedData.acceptDiscount && updatedData.discountPrice)) { 
                finalPrice = updatedData.discountPrice; 
                hasDiscount = true; 
            } 
        }
        updatedData.finalPrice = updatedData.bargaining ? null : finalPrice; 
        updatedData.hasDiscount = hasDiscount && !updatedData.bargaining;
        
        const featuresRaw = document.getElementById('featuresText').value; 
        updatedData.features = featuresRaw.split('\n').filter(l => l.trim()).map(l => l.replace(/^•\s*/, '').trim());
        
        const profileFile = document.getElementById('profileImage').files[0]; 
        const frontFile = document.getElementById('frontImage').files[0];
        const dashboardFiles = Array.from(document.getElementById('dashboardImages').files || []); 
        const otherFiles = Array.from(document.getElementById('otherImages').files || []);
        
        document.getElementById('submitBtn').disabled = true; 
        document.getElementById('submitBtn').innerHTML = '<iconify-icon icon="mdi:loading" class="animate-spin"></iconify-icon> Saving...';
        const loadingDiv = document.createElement('div'); loadingDiv.className = 'loading-overlay'; loadingDiv.innerHTML = '<div class="bg-white rounded-2xl p-4 shadow-xl">Updating...</div>'; document.body.appendChild(loadingDiv);
        
        try {
            const [profileUrl, frontUrl] = await Promise.all([profileFile ? uploadToImgBB(profileFile) : null, frontFile ? uploadToImgBB(frontFile) : null]);
            const dashboardUrls = await Promise.all(dashboardFiles.map(f => uploadToImgBB(f))); 
            const otherUrls = await Promise.all(otherFiles.map(f => uploadToImgBB(f)));
            const images = { 
                profile: profileUrl || currentData.images?.profile || null, 
                front: frontUrl || currentData.images?.front || null, 
                dashboard: [...(currentData.images?.dashboard || []), ...dashboardUrls].slice(0,5), 
                other: [...(currentData.images?.other || []), ...otherUrls].slice(0,5) 
            };
            updatedData.images = images;
            const accountRef = doc(db, 'marketplaceAccounts', accountId);
            await updateDoc(accountRef, updatedData);
            document.getElementById('formMessage').innerHTML = '<span class="text-emerald-600 text-sm">✅ Account updated! <a href="admin.html">Back to dashboard</a></span>';
        } catch(err) { 
            document.getElementById('formMessage').innerHTML = `<span class="text-red-500">❌ ${err.message}</span>`; 
        } finally { 
            document.getElementById('submitBtn').disabled = false; 
            document.getElementById('submitBtn').innerHTML = '<iconify-icon icon="mdi:content-save" width="18"></iconify-icon> Save Changes'; 
            loadingDiv.remove(); 
        }
    });

    document.getElementById('deleteBtn').addEventListener('click', async () => { 
        if(confirm('⚠️ PERMANENT DELETE: This action cannot be undone. Are you sure?')) { 
            await deleteDoc(doc(db, 'marketplaceAccounts', accountId)); 
            window.location.href = 'admin.html'; 
        } 
    });
    
    await fetchSettings(); 
    await loadAccount();
</script>
    <script type="module">
    import { logout, protectPage } from './auth.js';
    
    // Protect this page - redirects to login if not authenticated
    protectPage().catch(() => {});
    
    // Setup logout button
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
            await logout();
        });
    }
</script>
</body>
</html>
