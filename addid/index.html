<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Admin Login — Imbuga Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

<style>
* { font-family: 'Poppins', sans-serif; }
body { background: #f7f7f9; }

.card {
    background: white;
    border-radius: 28px;
    border: 1px solid #efeff1;
    box-shadow: 0 8px 30px rgba(0,0,0,0.04);
}

.input-modern {
    border: 1px solid #eaeaef;
    border-radius: 14px;
    transition: 0.2s;
}
.input-modern:focus {
    border-color: #9ca3af;
    outline: none;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.03);
}

.btn-primary {
    background: black;
    border-radius: 40px;
    transition: 0.2s;
}
.btn-primary:hover {
    background: #2c2c2e;
    transform: translateY(-1px);
}
.btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.scene {
    width: 60px;
    height: 60px;
    perspective: 600px;
    margin: auto;
}

.cube {
    width: 60px;
    height: 60px;
    position: relative;
    transform-style: preserve-3d;
    animation: rotateCube 5s infinite linear;
}

.face {
    position: absolute;
    width: 60px;
    height: 60px;
    background: black;
    opacity: 0.9;
    border-radius: 10px;
}

.front  { transform: rotateY(0deg) translateZ(30px); }
.back   { transform: rotateY(180deg) translateZ(30px); }
.right  { transform: rotateY(90deg) translateZ(30px); }
.left   { transform: rotateY(-90deg) translateZ(30px); }
.top    { transform: rotateX(90deg) translateZ(30px); }
.bottom { transform: rotateX(-90deg) translateZ(30px); }

@keyframes rotateCube {
    0% { transform: rotateX(0) rotateY(0); }
    100% { transform: rotateX(360deg) rotateY(360deg); }
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen px-4">

<div class="card p-8 w-full max-w-md text-center">

    <div class="scene mb-5">
        <div class="cube">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face right"></div>
            <div class="face left"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
        </div>
    </div>

    <h2 class="text-xl font-semibold text-gray-800">Admin Access</h2>
    <p class="text-gray-400 text-sm mt-1">Sign in with your admin account</p>

    <div class="mt-6 space-y-4">
        <div>
            <input 
                type="email" 
                id="emailInput"
                placeholder="Email address"
                class="input-modern w-full px-4 py-3 text-sm"
                autocomplete="email"
            >
        </div>
        
        <div class="relative">
            <input 
                type="password" 
                id="passwordInput"
                placeholder="Password"
                class="input-modern w-full px-4 py-3 text-sm pr-12"
                autocomplete="current-password"
            >
            <button 
                id="togglePassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                type="button"
            >
                <iconify-icon icon="mdi:eye" width="18"></iconify-icon>
            </button>
        </div>
    </div>

    <button 
        id="loginBtn"
        class="btn-primary w-full mt-6 py-3 text-white font-medium flex items-center justify-center gap-2"
    >
        <iconify-icon icon="mdi:login" width="18"></iconify-icon>
        Sign In
    </button>

    <div id="errorMsg" class="text-red-500 text-xs mt-3 hidden"></div>
</div>

<script type="module">
    import { login } from './auth.js';

    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");
    const toggleBtn = document.getElementById("togglePassword");

    // Toggle password visibility
    let passwordVisible = false;
    toggleBtn.addEventListener("click", () => {
        passwordVisible = !passwordVisible;
        passwordInput.type = passwordVisible ? "text" : "password";
        toggleBtn.innerHTML = passwordVisible 
            ? '<iconify-icon icon="mdi:eye-off" width="18"></iconify-icon>' 
            : '<iconify-icon icon="mdi:eye" width="18"></iconify-icon>';
    });

    async function handleLogin() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
            errorMsg.textContent = "Please enter both email and password";
            errorMsg.classList.remove("hidden");
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<iconify-icon icon="mdi:loading" class="animate-spin" width="18"></iconify-icon> Signing in...';
        errorMsg.classList.add("hidden");

        const result = await login(email, password);

        if (result.success) {
            window.location.href = "admin.html";
        } else {
            errorMsg.textContent = result.message || "Invalid email or password";
            errorMsg.classList.remove("hidden");
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<iconify-icon icon="mdi:login" width="18"></iconify-icon> Sign In';
        }
    }

    loginBtn.addEventListener("click", handleLogin);
    
    ["keypress", "keydown"].forEach(eventType => {
        passwordInput.addEventListener(eventType, (e) => {
            if (e.key === "Enter") handleLogin();
        });
        emailInput.addEventListener(eventType, (e) => {
            if (e.key === "Enter") handleLogin();
        });
    });

    // If already logged in, redirect to admin
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { auth, isAuthorizedAdmin } from './auth.js';
    
    onAuthStateChanged(auth, (user) => {
        if (user && isAuthorizedAdmin(user)) {
            window.location.href = "admin.html";
        }
    });
</script>

</body>
</html>
