<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Social Market — Buy & Sell Social Media Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: #fafafc; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f0f0f2; }
        ::-webkit-scrollbar-thumb { background: #c7c9ce; border-radius: 10px; }
        .glass-card { background: rgba(255, 255, 255, 0.96); border: 1px solid rgba(0, 0, 0, 0.04); transition: all 0.2s ease; cursor: pointer; }
        .glass-card:hover { border-color: rgba(0, 0, 0, 0.08); box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.05); transform: translateY(-2px); }
        .btn-sleek { transition: all 0.2s ease; }
        .btn-sleek:active { transform: scale(0.97); }
        .category-chip { transition: all 0.2s; cursor: pointer; }
        .category-active { background: #111111; color: white; border-color: #111111; }
        .category-inactive { background: transparent; color: #2c2c2e; border-color: #e4e4e7; }
        .category-inactive:hover { background: #f4f4f6; border-color: #c7c9ce; }
        .price-badge { background: #f8f9fc; border-radius: 12px; padding: 2px 8px; font-size: 12px; }
        .original-price { text-decoration: line-through; color: #9ca3af; font-size: 13px; }
        .discount-badge { background: #10b981; color: white; font-size: 10px; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-left: 8px; }
        .hero-image-container { background: transparent; box-shadow: none; border: none; }
    </style>
</head>
<body class="antialiased">

<div class="max-w-7xl mx-auto px-5 sm:px-8 py-6 sm:py-8">
    <!-- HEADER: Logo + Start Selling button -->
    <header class="flex items-center justify-between mb-10 pb-4 border-b border-gray-100">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-black rounded-2xl flex items-center justify-center shadow-sm">
                <iconify-icon icon="ri:exchange-dollar-line" width="24" height="24" class="text-white"></iconify-icon>
            </div>
            <div class="flex items-baseline">
                <span class="w-6 h-0.5 bg-gray-300 rounded-full block ml-1"></span>
                <span class="w-2 h-2 bg-gray-400 rounded-full ml-1"></span>
            </div>
        </div>
        <button id="startSellingBtn" class="bg-black text-white px-6 py-2.5 rounded-full font-medium text-sm shadow-md shadow-black/10 btn-sleek flex items-center gap-2">
            <iconify-icon icon="mdi:storefront-outline" width="18" height="18"></iconify-icon>
            Start selling
        </button>
    </header>

    <!-- HERO SECTION with image (no shadows/borders) + social logos at bottom -->
    <section class="mb-16 flex flex-col md:flex-row md:justify-between md:items-center gap-10">
        <div class="max-w-2xl">
            <div class="inline-flex items-center gap-2 bg-white/70 backdrop-blur-sm px-4 py-1.5 rounded-full border border-gray-200 shadow-sm mb-5">
                <iconify-icon icon="solar:graph-new-up-linear" width="16" height="16" class="text-emerald-600"></iconify-icon>
                <span class="text-xs font-medium text-gray-700 tracking-wide">TRUSTED MARKETPLACE</span>
            </div>
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-bold tracking-tight text-gray-900 leading-[1.2]">
                Swap & scale<br>
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-500">social empires.</span>
            </h1>
            <p class="text-gray-500 text-lg mt-5 max-w-lg leading-relaxed">
                Seamless exchange. Verified accounts. Zero friction — buy or sell Instagram, TikTok, X, and more.
            </p>
            <div class="flex flex-wrap gap-4 mt-8">
                <button id="exploreBtn" class="bg-black text-white px-7 py-3 rounded-full font-medium text-sm shadow-md shadow-black/5 btn-sleek flex items-center gap-2">
                    <iconify-icon icon="mdi:cart-outline" width="18" height="18"></iconify-icon>
                    Explore listings
                </button>
                <button id="startSellingBtn2" class="border border-gray-300 bg-white text-gray-800 px-7 py-3 rounded-full font-medium text-sm btn-sleek flex items-center gap-2">
                    <iconify-icon icon="mdi:storefront-outline" width="18" height="18"></iconify-icon>
                    Start selling
                </button>
            </div>
        </div>
        <div class="hero-image-container flex-shrink-0">
            <img src="Image/hero.png" alt="Social Market" class="w-full max-w-md mx-auto md:max-w-lg" onerror="this.src='https://placehold.co/500x400/f0f0f0/333?text=Social+Market'">
            <!-- Social Media Logos at bottom of image -->
            <div class="flex justify-center items-center gap-5 mt-5">
                <iconify-icon icon="skill-icons:instagram" width="28" height="28" class="text-gray-500 hover:text-black transition cursor-pointer"></iconify-icon>
                <iconify-icon icon="logos:tiktok-icon" width="28" height="28" class="text-gray-500 hover:text-black transition cursor-pointer"></iconify-icon>
                <iconify-icon icon="logos:twitter" width="28" height="28" class="text-gray-500 hover:text-black transition cursor-pointer"></iconify-icon>
                <iconify-icon icon="logos:youtube-icon" width="28" height="28" class="text-gray-500 hover:text-black transition cursor-pointer"></iconify-icon>
                <iconify-icon icon="logos:linkedin-icon" width="28" height="28" class="text-gray-500 hover:text-black transition cursor-pointer"></iconify-icon>
            </div>
        </div>
    </section>

    <!-- Search Bar -->
    <div class="mb-6">
        <div class="relative max-w-md">
            <iconify-icon icon="mdi:magnify" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" width="20"></iconify-icon>
            <input type="text" id="searchInput" placeholder="Search by nickname or platform..." class="w-full pl-12 pr-4 py-3 rounded-2xl border border-gray-200 focus:border-black focus:outline-none transition">
        </div>
    </div>

    <!-- Filter Bar: Platform, Price Range, Category -->
    <div class="flex flex-wrap items-center gap-4 mb-6 pb-3 border-b border-gray-100">
        <div class="flex flex-wrap gap-2 items-center">
            <span class="text-xs text-gray-400 font-medium mr-1">Platform:</span>
            <button data-platform="all" class="platform-chip category-active px-4 py-1.5 rounded-full text-sm font-medium border transition-all">All</button>
            <button data-platform="Instagram" class="platform-chip category-inactive px-4 py-1.5 rounded-full text-sm font-medium border transition-all">Instagram</button>
            <button data-platform="Tiktok" class="platform-chip category-inactive px-4 py-1.5 rounded-full text-sm font-medium border transition-all">TikTok</button>
            <button data-platform="Youtube" class="platform-chip category-inactive px-4 py-1.5 rounded-full text-sm font-medium border transition-all">YouTube</button>
            <button data-platform="Linkedin" class="platform-chip category-inactive px-4 py-1.5 rounded-full text-sm font-medium border transition-all">LinkedIn</button>
            <button data-platform="X" class="platform-chip category-inactive px-4 py-1.5 rounded-full text-sm font-medium border transition-all">X (Twitter)</button>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-xs text-gray-400 font-medium">Price:</span>
            <input type="number" id="minPrice" placeholder="Min $" class="w-28 px-3 py-1.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-black">
            <span class="text-gray-400">-</span>
            <input type="number" id="maxPrice" placeholder="Max $" class="w-28 px-3 py-1.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-black">
        </div>
        <div class="flex items-center gap-2">
            <span class="text-xs text-gray-400 font-medium">Category:</span>
            <select id="categoryFilter" class="px-3 py-1.5 border border-gray-200 rounded-xl text-sm bg-white focus:outline-none focus:border-black">
                <option value="all">All Categories</option>
            </select>
        </div>
    </div>

    <!-- Products Grid -->
    <div id="listings-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-7 pb-20">
        <div class="col-span-full text-center py-12 text-gray-400">Loading accounts...</div>
    </div>

    <!-- Footer -->
    <footer class="pt-16 pb-8 border-t border-gray-200 mt-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-5">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-black rounded-xl flex items-center justify-center">
                    <iconify-icon icon="ri:exchange-dollar-line" width="16" height="16" class="text-white"></iconify-icon>
                </div>
                <span class="text-[0px]">social market</span>
            </div>
            <div class="flex gap-7 text-gray-400 text-sm">
                <a href="#" id="trustLink" class="hover:text-gray-800 transition flex items-center gap-1"><iconify-icon icon="mdi:shield-check-outline" width="18" height="18"></iconify-icon> Trust</a>
                <a href="#" id="guidelinesLink" class="hover:text-gray-800 transition flex items-center gap-1"><iconify-icon icon="mdi:file-document-outline" width="18" height="18"></iconify-icon> Guidelines</a>
                <a href="#" id="supportLink" class="hover:text-gray-800 transition flex items-center gap-1"><iconify-icon icon="mdi:help-circle-outline" width="18" height="18"></iconify-icon> Support</a>
            </div>
            <div class="text-gray-300 text-xs flex items-center gap-2">
                <iconify-icon icon="ph:copyright" width="12"></iconify-icon> 2026 — all digital rights
            </div>
        </div>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    // Mobile detection - redirect to indexp.html
    if (window.innerWidth < 768) {
        window.location.href = "indexp.html";
    }
    
    window.addEventListener('resize', () => {
        if (window.innerWidth < 768) {
            window.location.href = "indexp.html";
        }
    });
    
    const firebaseConfig = {
        apiKey: "AIzaSyBAJBge8NM51f7IvwaE5X1fXsC8H-0Tlv0",
        authDomain: "project-k21n.firebaseapp.com",
        projectId: "project-k21n",
        storageBucket: "project-k21n.firebasestorage.app",
        messagingSenderId: "266081318769",
        appId: "1:266081318769:web:a7893c55b5b30a8dd768d0"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let allAccounts = [];
    let categoriesArray = [];
    
    async function loadAccounts() {
        try {
            const querySnapshot = await getDocs(collection(db, 'marketplaceAccounts'));
            allAccounts = [];
            querySnapshot.forEach(doc => {
                const data = doc.data();
                if (data.status !== 'sold') {
                    allAccounts.push({ id: doc.id, ...data });
                }
            });
            await loadCategories();
            renderAccounts();
        } catch(e) {
            console.error("Firebase error:", e);
            document.getElementById('listings-grid').innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">Unable to load accounts. Please try again later.</div>';
        }
    }
    
    async function loadCategories() {
        try {
            const settingsDoc = await getDoc(doc(db, 'adminSettings', 'config'));
            if (settingsDoc.exists()) {
                categoriesArray = settingsDoc.data().categories || ['Fashion', 'Tech', 'Gaming', 'Lifestyle'];
            } else {
                categoriesArray = ['Fashion', 'Tech', 'Gaming', 'Lifestyle'];
            }
            const categorySelect = document.getElementById('categoryFilter');
            categorySelect.innerHTML = '<option value="all">All Categories</option>' + categoriesArray.map(c => `<option value="${c}">${c}</option>`).join('');
        } catch(e) {
            categoriesArray = ['Fashion', 'Tech', 'Gaming', 'Lifestyle'];
            const categorySelect = document.getElementById('categoryFilter');
            categorySelect.innerHTML = '<option value="all">All Categories</option>' + categoriesArray.map(c => `<option value="${c}">${c}</option>`).join('');
        }
        renderAccounts();
    }
    
    function getCurrentFilters() {
        const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
        const platform = document.querySelector('.platform-chip.category-active')?.getAttribute('data-platform') || 'all';
        const minPrice = parseFloat(document.getElementById('minPrice')?.value) || 0;
        const maxPrice = parseFloat(document.getElementById('maxPrice')?.value) || Infinity;
        const category = document.getElementById('categoryFilter')?.value || 'all';
        return { searchTerm, platform, minPrice, maxPrice, category };
    }
    
    function renderAccounts() {
        const { searchTerm, platform, minPrice, maxPrice, category } = getCurrentFilters();
        
        let filtered = allAccounts.filter(acc => {
            const matchesSearch = !searchTerm || acc.nickname?.toLowerCase().includes(searchTerm) || acc.socialMedia?.toLowerCase().includes(searchTerm);
            const matchesPlatform = platform === 'all' || (acc.socialMedia && acc.socialMedia.toLowerCase() === platform.toLowerCase());
            const price = acc.finalPrice || acc.originalPrice || 0;
            const matchesPrice = price >= minPrice && price <= maxPrice;
            const matchesCategory = category === 'all' || acc.category === category;
            return matchesSearch && matchesPlatform && matchesPrice && matchesCategory;
        });
        
        const container = document.getElementById('listings-grid');
        if (filtered.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center py-16 text-gray-400">No accounts match your filters</div>';
            return;
        }
        
        container.innerHTML = filtered.map(acc => {
            const displayPrice = acc.finalPrice || acc.originalPrice;
            const hasDiscount = acc.hasDiscount || (acc.discountPrice && !acc.bargaining);
            const acceptDiscountChecked = acc.acceptDiscount === true;
            
            let originalPriceDisplay = '';
            let discountBadge = '';
            
            if (hasDiscount && acc.originalPrice && acc.originalPrice !== displayPrice) {
                originalPriceDisplay = `<span class="original-price">$${acc.originalPrice?.toLocaleString()}</span>`;
            }
            
            if (acceptDiscountChecked) {
                discountBadge = `<span class="discount-badge">✔ Discount</span>`;
            }
            
            const priceHtml = acc.bargaining ? '<span class="text-sm text-gray-500">Negotiable</span>' : `<span class="text-xl font-bold">$${displayPrice?.toLocaleString()}</span> ${originalPriceDisplay} ${discountBadge}`;
            
            let platformIcon = "mdi:instagram";
            if (acc.socialMedia?.toLowerCase() === 'instagram') platformIcon = "skill-icons:instagram";
            else if (acc.socialMedia?.toLowerCase() === 'tiktok') platformIcon = "logos:tiktok-icon";
            else if (acc.socialMedia?.toLowerCase() === 'youtube') platformIcon = "logos:youtube-icon";
            else if (acc.socialMedia?.toLowerCase() === 'linkedin') platformIcon = "logos:linkedin-icon";
            else if (acc.socialMedia?.toLowerCase() === 'x') platformIcon = "logos:twitter";
            
            const profileImg = acc.images?.profile || null;
            
            return `
                <div class="glass-card rounded-2xl overflow-hidden cursor-pointer product-card" data-id="${acc.id}">
                    <div class="p-5 pb-3 flex items-start gap-3">
                        ${profileImg ? `<img src="${profileImg}" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm">` : `<div class="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center"><iconify-icon icon="${platformIcon}" width="32" height="32"></iconify-icon></div>`}
                        <div class="flex-1">
                            <h3 class="font-semibold text-gray-800 text-base tracking-tight">${escapeHtml(acc.nickname)}</h3>
                            <div class="flex items-center gap-1.5 mt-0.5">
                                <span class="text-[11px] font-medium uppercase tracking-wider text-gray-400">${acc.socialMedia || ''}</span>
                                ${acc.verified ? '<iconify-icon icon="mdi:check-decagram" width="12" height="12" class="text-blue-500"></iconify-icon>' : ''}
                            </div>
                        </div>
                    </div>
                    <div class="px-5 py-2 flex justify-between items-center border-y border-gray-50 bg-gray-50/30">
                        <div class="flex items-center gap-1"><iconify-icon icon="mdi:account-group-outline" width="14" class="text-gray-400"></iconify-icon><span class="text-sm font-medium text-gray-700">${acc.followers?.toLocaleString() || 0}</span></div>
                        <div class="flex items-center gap-1"><iconify-icon icon="mdi:trending-up" width="14" class="text-emerald-500"></iconify-icon><span class="text-sm font-medium text-gray-700">${acc.engagement || 'N/A'}</span></div>
                    </div>
                    <div class="p-5 pt-4 flex items-center justify-between">
                        <div>${priceHtml}</div>
                        <button class="view-details-btn bg-black text-white px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-1.5 shadow-sm btn-sleek" data-id="${acc.id}">
                            <iconify-icon icon="mdi:eye-outline" width="16"></iconify-icon> View
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.product-card, .view-details-btn').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = el.getAttribute('data-id');
                if (id) window.location.href = `view.html?id=${id}`;
            });
        });
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    // Filter event listeners
    document.getElementById('searchInput')?.addEventListener('input', () => renderAccounts());
    document.getElementById('minPrice')?.addEventListener('input', () => renderAccounts());
    document.getElementById('maxPrice')?.addEventListener('input', () => renderAccounts());
    document.getElementById('categoryFilter')?.addEventListener('change', () => renderAccounts());
    
    document.querySelectorAll('.platform-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.platform-chip').forEach(c => {
                c.classList.remove('category-active');
                c.classList.add('category-inactive');
            });
            chip.classList.remove('category-inactive');
            chip.classList.add('category-active');
            renderAccounts();
        });
    });
    
    // Button actions
    document.getElementById('exploreBtn')?.addEventListener('click', () => {
        document.getElementById('listings-grid').scrollIntoView({ behavior: 'smooth' });
    });
    
    const startSellingBtns = [document.getElementById('startSellingBtn'), document.getElementById('startSellingBtn2')];
    startSellingBtns.forEach(btn => {
        btn?.addEventListener('click', () => { window.location.href = 'sell.html'; });
    });
    
    // Trust, Guidelines, Support - open info.html
    document.getElementById('trustLink')?.addEventListener('click', (e) => { 
        e.preventDefault(); 
        window.location.href = 'info.html'; 
    });
    document.getElementById('guidelinesLink')?.addEventListener('click', (e) => { 
        e.preventDefault(); 
        window.location.href = 'info.html'; 
    });
    document.getElementById('supportLink')?.addEventListener('click', (e) => { 
        e.preventDefault(); 
        window.location.href = 'info.html'; 
    });
    
    loadAccounts();
</script>
</body>
</html>
