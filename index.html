<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Social Market — Buy & Sell Accounts</title>
    <!-- Poppins Font + Tailwind CSS + Iconify API -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconify Web Component (lightweight, uses official API) -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <!-- Override Tailwind theme to enforce Poppins & custom minimal styling -->
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: #fafafc;
            scroll-behavior: smooth;
        }
        /* Custom sleek scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #f0f0f2;
        }
        ::-webkit-scrollbar-thumb {
            background: #c7c9ce;
            border-radius: 10px;
        }
        /* Glassmorphism helper for cards (minimal) */
        .glass-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.2s ease;
        }
        .glass-card:hover {
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
        }
        .btn-sleek {
            transition: all 0.2s ease;
        }
        .btn-sleek:active {
            transform: scale(0.97);
        }
        /* Hide any potential text-based site name – only logo visual */
        .logo-text-hidden {
            font-size: 0;
            line-height: 0;
            text-indent: -9999px;
        }
        /* category chips */
        .category-active {
            background: #111111;
            color: white;
            border-color: #111111;
        }
        .category-inactive {
            background: transparent;
            color: #2c2c2e;
            border-color: #e4e4e7;
        }
        .category-inactive:hover {
            background: #f4f4f6;
            border-color: #c7c9ce;
        }
    </style>
</head>
<body class="antialiased">

    <!-- MAIN CONTAINER: No site name text anywhere, only logo symbol -->
    <div class="max-w-7xl mx-auto px-5 sm:px-8 py-6 sm:py-8">
        
        <!-- HEADER: Only Logo (icon + visual mark) + minimal actions -->
        <header class="flex items-center justify-between mb-12 border-b border-gray-100 pb-5">
            <!-- LOGO SECTION: no text, just a modern abstract mark + icon -->
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-black rounded-2xl flex items-center justify-center shadow-sm">
                    <iconify-icon icon="ri:exchange-dollar-line" width="24" height="24" class="text-white"></iconify-icon>
                </div>
                <div class="flex items-baseline">
                    <!-- Absolutely NO site name displayed: just a small decorative dash -->
                    <span class="w-6 h-0.5 bg-gray-300 rounded-full block ml-1"></span>
                    <span class="w-2 h-2 bg-gray-400 rounded-full ml-1"></span>
                </div>
            </div>
            <!-- Minimal nav: only icons using Iconify, no text -->
            <div class="flex items-center gap-5">
                <button class="text-gray-500 hover:text-black transition btn-sleek">
                    <iconify-icon icon="heroicons:heart-outline" width="22" height="22"></iconify-icon>
                </button>
                <button class="text-gray-500 hover:text-black transition btn-sleek">
                    <iconify-icon icon="heroicons:bell" width="22" height="22"></iconify-icon>
                </button>
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-gray-200 to-gray-300 flex items-center justify-center overflow-hidden border border-white/20">
                    <iconify-icon icon="ph:user-bold" width="18" height="18" class="text-gray-600"></iconify-icon>
                </div>
            </div>
        </header>

        <!-- HERO SECTION: minimal & sleek (no mention of site name, only value) -->
        <section class="mb-16 text-center md:text-left md:flex md:justify-between md:items-end gap-6">
            <div class="max-w-2xl">
                <div class="inline-flex items-center gap-2 bg-white/70 backdrop-blur-sm px-4 py-1.5 rounded-full border border-gray-200 shadow-sm mb-5">
                    <iconify-icon icon="solar:graph-new-up-linear" width="16" height="16" class="text-emerald-600"></iconify-icon>
                    <span class="text-xs font-medium text-gray-700 tracking-wide">TRUSTED MARKETPLACE</span>
                </div>
                <h1 class="text-4xl sm:text-5xl md:text-6xl font-bold tracking-tight text-gray-900 leading-[1.2]">
                    Swap & scale<br>
                    <span class="bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-500">social empires.</span>
                </h1>
                <p class="text-gray-500 text-lg mt-5 max-w-lg leading-relaxed">
                    Seamless exchange. Verified accounts. Zero friction — buy or sell Instagram, TikTok, X, and more.
                </p>
                <div class="flex flex-wrap gap-4 mt-8">
                    <button class="bg-black text-white px-7 py-3 rounded-full font-medium text-sm shadow-md shadow-black/5 btn-sleek flex items-center gap-2">
                        <iconify-icon icon="mdi:cart-outline" width="18" height="18"></iconify-icon>
                        Explore listings
                    </button>
                    <button class="border border-gray-300 bg-white text-gray-800 px-7 py-3 rounded-full font-medium text-sm btn-sleek flex items-center gap-2">
                        <iconify-icon icon="mdi:storefront-outline" width="18" height="18"></iconify-icon>
                        Start selling
                    </button>
                </div>
            </div>
            <!-- decorative floating icon group -->
            <div class="hidden md:flex gap-3 mt-8 md:mt-0">
                <div class="bg-white/50 rounded-3xl p-3 shadow-sm border border-gray-100">
                    <iconify-icon icon="logos:instagram-icon" width="38" height="38"></iconify-icon>
                </div>
                <div class="bg-white/50 rounded-3xl p-3 shadow-sm border border-gray-100">
                    <iconify-icon icon="logos:tiktok-icon" width="38" height="38"></iconify-icon>
                </div>
 <div class="bg-white/50 rounded-3xl p-3 shadow-sm border border-gray-100">
                    <iconify-icon icon="logos:twitter" width="38" height="38"></iconify-icon>
                </div>
            </div>
        </section>

        <!-- Filter / Category row (only icons + minimal design) -->
        <div class="flex flex-wrap items-center justify-between gap-4 mb-10 pb-2 border-b border-gray-100">
            <div class="flex flex-wrap gap-2">
                <button data-cat="all" class="category-chip category-active px-5 py-2 rounded-full text-sm font-medium border transition-all">All</button>
                <button data-cat="instagram" class="category-chip category-inactive px-5 py-2 rounded-full text-sm font-medium border transition-all">Instagram</button>
                <button data-cat="tiktok" class="category-chip category-inactive px-5 py-2 rounded-full text-sm font-medium border transition-all">TikTok</button>
                <button data-cat="twitter" class="category-chip category-inactive px-5 py-2 rounded-full text-sm font-medium border transition-all">X (Twitter)</button>
                <button data-cat="youtube" class="category-chip category-inactive px-5 py-2 rounded-full text-sm font-medium border transition-all">YouTube</button>
            </div>
            <div class="flex items-center gap-3 text-gray-400 text-sm">
                <iconify-icon icon="mdi:tune-variant" width="18" height="18"></iconify-icon>
                <span class="text-gray-500 text-xs font-medium">filter by platform</span>
            </div>
        </div>

        <!-- Products Grid: dynamic cards (modern, sleek, minimal) -->
        <div id="listings-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-7 pb-20">
            <!-- cards will be injected via JS, but also provide static fallback -->
        </div>

        <!-- footer: minimal & brand logo only, no name -->
        <footer class="pt-16 pb-8 border-t border-gray-200 mt-10">
            <div class="flex flex-col md:flex-row justify-between items-center gap-5">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-black rounded-xl flex items-center justify-center">
                        <iconify-icon icon="ri:exchange-dollar-line" width="16" height="16" class="text-white"></iconify-icon>
                    </div>
                    <span class="text-[0px]">social market</span> <!-- completely hidden but accessible -->
                </div>
                <div class="flex gap-7 text-gray-400 text-sm">
                    <a href="#" class="hover:text-gray-800 transition"><iconify-icon icon="mdi:shield-check-outline" width="18" height="18" class="inline mr-1"></iconify-icon> Trust</a>
                    <a href="#" class="hover:text-gray-800 transition"><iconify-icon icon="mdi:file-document-outline" width="18" height="18" class="inline mr-1"></iconify-icon> Guidelines</a>
                    <a href="#" class="hover:text-gray-800 transition"><iconify-icon icon="mdi:help-circle-outline" width="18" height="18" class="inline mr-1"></iconify-icon> Support</a>
                </div>
                <div class="text-gray-300 text-xs flex items-center gap-2">
                    <iconify-icon icon="ph:copyright" width="12"></iconify-icon> 2026 — all digital rights
                </div>
            </div>
        </footer>
    </div>

    <script>
        // ---------- DATABASE OF LISTINGS (social media accounts for buy/sell) ----------
        // Each listing contains platform, price, followers, engagement, badge, and iconify icon for platform
        const listingsData = [
            { id: 1, platform: "instagram", title: "Fashion niche · 87k", price: 1240, followers: "87.2K", engagement: "5.8%", verified: true, badge: "high trust", icon: "skill-icons:instagram", bgGlow: "from-pink-50 to-orange-50" },
            { id: 2, platform: "tiktok", title: "Viral meme hub", price: 2150, followers: "214K", engagement: "9.2%", verified: false, badge: "rising", icon: "logos:tiktok-icon", bgGlow: "from-gray-50 to-blue-50" },
            { id: 3, platform: "twitter", title: "Crypto news acc", price: 890, followers: "41.5K", engagement: "3.4%", verified: true, badge: "blue check", icon: "logos:twitter", bgGlow: "from-slate-50 to-gray-100" },
            { id: 4, platform: "youtube", title: "Tech reviews channel", price: 3450, followers: "129K", engagement: "7.1%", verified: true, badge: "monetized", icon: "logos:youtube-icon", bgGlow: "from-red-50 to-rose-50" },
            { id: 5, platform: "instagram", title: "Travel diary", price: 990, followers: "53.3K", engagement: "6.2%", verified: false, badge: "story seller", icon: "skill-icons:instagram", bgGlow: "from-pink-50 to-orange-50" },
            { id: 6, platform: "tiktok", title: "Dance & lifestyle", price: 1820, followers: "176K", engagement: "8.7%", verified: true, badge: "viral", icon: "logos:tiktok-icon", bgGlow: "from-gray-50 to-blue-50" },
            { id: 7, platform: "twitter", title: "Marketing expert", price: 750, followers: "28.9K", engagement: "4.3%", verified: false, badge: "engagement+", icon: "logos:twitter", bgGlow: "from-slate-50 to-gray-100" },
            { id: 8, platform: "youtube", title: "Gaming highlights", price: 2780, followers: "98.4K", engagement: "6.9%", verified: true, badge: "partner", icon: "logos:youtube-icon", bgGlow: "from-red-50 to-rose-50" },
            { id: 9, platform: "instagram", title: "Minimal art curator", price: 1630, followers: "112K", engagement: "4.9%", verified: false, badge: "curator", icon: "skill-icons:instagram", bgGlow: "from-pink-50 to-orange-50" },
            { id: 10, platform: "tiktok", title: "Food & recipes", price: 1440, followers: "201K", engagement: "7.3%", verified: true, badge: "top creator", icon: "logos:tiktok-icon", bgGlow: "from-gray-50 to-blue-50" },
            { id: 11, platform: "twitter", title: "Startup insights", price: 1120, followers: "67.1K", engagement: "5.2%", verified: true, badge: "influencer", icon: "logos:twitter", bgGlow: "from-slate-50 to-gray-100" },
            { id: 12, platform: "youtube", title: "Vlog & lifestyle", price: 2210, followers: "155K", engagement: "5.6%", verified: false, badge: "growing", icon: "logos:youtube-icon", bgGlow: "from-red-50 to-rose-50" }
        ];

        // Render function using Iconify & Tailwind classes (modern sleek minimal cards)
        function renderListings(filter = "all") {
            const grid = document.getElementById("listings-grid");
            if (!grid) return;
            
            let filtered = [...listingsData];
            if (filter !== "all") {
                filtered = listingsData.filter(item => item.platform === filter);
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-16 text-gray-400 gap-3">
                                    <iconify-icon icon="mdi:database-off-outline" width="48" height="48"></iconify-icon>
                                    <p class="text-sm font-medium">No accounts found for this category</p>
                                </div>`;
                return;
            }
            
            // Build HTML cards — each card is minimal, uses Iconify for platform and actions
            const cardsHTML = filtered.map(acc => {
                // format price with USD
                const formattedPrice = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0 }).format(acc.price);
                // dynamic background gradient (soft)
                const bgGradient = acc.bgGlow || "from-gray-50 to-white";
                
                return `
                    <div class="glass-card rounded-2xl overflow-hidden transition-all duration-200 hover:shadow-xl bg-white border border-gray-100/80">
                        <!-- header with platform icon + badge minimal -->
                        <div class="p-5 pb-3 flex items-start justify-between">
                            <div class="flex items-center gap-2.5">
                                <div class="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center shadow-inner">
                                    <iconify-icon icon="${acc.icon}" width="28" height="28" class="object-contain"></iconify-icon>
                                </div>
                                <div>
                                    <h3 class="font-semibold text-gray-800 text-base tracking-tight">${acc.title}</h3>
                                    <div class="flex items-center gap-1.5 mt-0.5">
                                        <span class="text-[11px] font-medium uppercase tracking-wider text-gray-400">${acc.platform}</span>
                                        ${acc.verified ? '<iconify-icon icon="mdi:check-decagram" width="12" height="12" class="text-blue-500"></iconify-icon>' : ''}
                                    </div>
                                </div>
                            </div>
                            <div class="bg-black/5 rounded-full px-2.5 py-1 text-[10px] font-semibold text-gray-600 border border-black/5">
                                ${acc.badge}
                            </div>
                        </div>
                        
                        <!-- stats row: followers & engagement -->
                        <div class="px-5 py-2 flex justify-between items-center border-y border-gray-50 bg-gray-50/30">
                            <div class="flex items-center gap-1">
                                <iconify-icon icon="mdi:account-group-outline" width="14" height="14" class="text-gray-400"></iconify-icon>
                                <span class="text-sm font-medium text-gray-700">${acc.followers}</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <iconify-icon icon="mdi:trending-up" width="14" height="14" class="text-emerald-500"></iconify-icon>
                                <span class="text-sm font-medium text-gray-700">${acc.engagement} ER</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <iconify-icon icon="mdi:lightning-bolt" width="14" height="14" class="text-amber-400"></iconify-icon>
                                <span class="text-[11px] text-gray-400">active</span>
                            </div>
                        </div>
                        
                        <!-- price & action -->
                        <div class="p-5 pt-4 flex items-center justify-between">
                            <div>
                                <span class="text-2xl font-bold tracking-tight text-gray-900">${formattedPrice}</span>
                                <span class="text-xs text-gray-400 ml-0.5">USD</span>
                            </div>
                            <div class="flex gap-2">
                                <button class="text-gray-500 hover:text-black transition btn-sleek p-2 rounded-full hover:bg-gray-100">
                                    <iconify-icon icon="heroicons:heart-outline" width="18" height="18"></iconify-icon>
                                </button>
                                <button class="bg-black text-white px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-1.5 shadow-sm btn-sleek">
                                    <iconify-icon icon="mdi:cart-outline" width="16" height="16"></iconify-icon>
                                    Buy
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            grid.innerHTML = cardsHTML;
            // Re-scan for any dynamic iconify elements (Iconify handles automatically via iconify-icon tag)
            if (window.iconify) window.iconify.scan?.(grid);
        }
        
        // -------- Category filtering with active state style -------
        function initFilters() {
            const chips = document.querySelectorAll('.category-chip');
            const setActive = (activeEl) => {
                chips.forEach(chip => {
                    if (chip === activeEl) {
                        chip.classList.remove('category-inactive');
                        chip.classList.add('category-active');
                    } else {
                        chip.classList.remove('category-active');
                        chip.classList.add('category-inactive');
                    }
                });
            };
            
            chips.forEach(chip => {
                chip.addEventListener('click', (e) => {
                    const filterValue = chip.getAttribute('data-cat');
                    setActive(chip);
                    renderListings(filterValue);
                });
            });
        }
        
        // initial render all
        renderListings("all");
        initFilters();
        
        // small fix to make sure all iconify icons appear after dynamic content (iconify web component auto-upgrades)
        if (typeof Iconify !== 'undefined') {
            // ensure Iconify handles future elements, but iconify-icon component is autonomous.
        }
        
        // additional hover smoothness for like button console log (optional but sleek)
        document.addEventListener('click', (e) => {
            const target = e.target.closest('button');
            if (target && target.querySelector('iconify-icon[icon="heroicons:heart-outline"]')) {
                // minimal micro interaction (just visual, no name)
                const iconEl = target.querySelector('iconify-icon');
                if (iconEl) {
                    iconEl.setAttribute('icon', 'heroicons:heart-solid');
                    setTimeout(() => {
                        iconEl.setAttribute('icon', 'heroicons:heart-outline');
                    }, 400);
                }
            }
        });
        
        // add extra safety for any text that might appear (ensuring site name never visible)
        // we already have hidden spans or no text, but check for any meta.
        const hiddenLogoCheck = () => {
            const anyBrandText = document.querySelectorAll('.brand-name, .site-title, .logo-text');
            anyBrandText.forEach(el => el.style.display = 'none');
        };
        hiddenLogoCheck();
    </script>
    <!-- iconify API is automatically used by iconify-icon component, it fetches from CDN based on icon sets, respecting Iconify docs. All icons are loaded on demand. -->
</body>
</html>
