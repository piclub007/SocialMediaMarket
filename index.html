        if(existing) existing.remove();
        const modal = document.createElement('div');

    // ==================== CORE FUNCTIONS ====================
    function updateUserProfile(account) {
        if (!account) return;
        userProfile.viewedPlatforms[account.socialMedia] = (userProfile.viewedPlatforms[account.socialMedia] || 0) + 1;
        if (account.category) userProfile.viewedCategories[account.category] = (userProfile.viewedCategories[account.category] || 0) + 1;
        const price = account.finalPrice || account.originalPrice || 0;
        if (price > 0) {
            if (price < userProfile.priceRange.min || userProfile.priceRange.min === 0) userProfile.priceRange.min = price;
            if (price > userProfile.priceRange.max) userProfile.priceRange.max = price;
            userProfile.interestedPrice = price;
        }
        userProfile.clickedAccounts.push({ id: account.id, platform: account.socialMedia, price, timestamp: Date.now() });
        if (userProfile.clickedAccounts.length > 20) userProfile.clickedAccounts.shift();
        let maxViews = 0;
        for (const [platform, count] of Object.entries(userProfile.viewedPlatforms)) if (count > maxViews) { maxViews = count; userProfile.interestedPlatform = platform; }
        userProfile.lastUpdated = Date.now();
        localStorage.setItem('socialMarketProfile', JSON.stringify(userProfile));
    }
    
    function getWeightedRandomAccount(accounts, weights) {
        if (!accounts.length) return null;
        const total = weights.reduce((a,b)=>a+b,0);
        let r = Math.random() * total;
        for (let i=0; i<accounts.length; i++) { if (r < weights[i]) return accounts[i]; r -= weights[i]; }
        return accounts[0];
    }
    
    function getFeaturedAccounts(accounts, count = 12) {
        if (!accounts.length) return [];
        let eligible = accounts.filter(a => a.status !== 'sold' && a.images?.front);
        if (!eligible.length) return [];
        eligible.sort((a,b) => {
            const dateA = a.createdAt ? new Date(a.createdAt).getTime() : 0;
            const dateB = b.createdAt ? new Date(b.createdAt).getTime() : 0;
            return dateB - dateA;
        });
        const topRecent = eligible.slice(0, 30);
        for (let i=topRecent.length-1; i>0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [topRecent[i], topRecent[j]] = [topRecent[j], topRecent[i]];
        }
        return topRecent.slice(0, count);
    }
    
    function renderFeatured() {
        if (!allAccounts.length) return;
        featuredAccounts = getFeaturedAccounts(allAccounts, 12);
        const track = document.getElementById('featuredTrack');
        if (!track) return;
        track.innerHTML = featuredAccounts.map(acc => `
            <div class="featured-item" data-id="${acc.id}">
                <img src="${acc.images?.front || 'https://placehold.co/300x500/1a1a1a/666?text=No+Image'}" class="featured-image" onerror="this.src='https://placehold.co/300x500/1a1a1a/666?text=Image+Error'">
                <div class="featured-followers">
                    <iconify-icon icon="mdi:account-group-outline" width="14"></iconify-icon>
                    ${acc.followers?.toLocaleString() || 0}
                </div>
            </div>
        `).join('');
        track.querySelectorAll('.featured-item').forEach(el => {
            el.addEventListener('click', () => { const id = el.dataset.id; if (id) window.location.href = `view.html?id=${id}`; });
        });
        currentFeaturedIndex = 0;
        updateFeaturedPosition();
        if (featuredInterval) clearInterval(featuredInterval);
        featuredInterval = setInterval(() => {
            if (featuredAccounts.length > 1) {
                currentFeaturedIndex = (currentFeaturedIndex + 1) % featuredAccounts.length;
                updateFeaturedPosition();
            }
        }, 2000);
    }
    
    function updateFeaturedPosition() {
        const track = document.getElementById('featuredTrack');
        if (!track || featuredAccounts.length === 0) return;
        const slideWidth = track.children[0]?.offsetWidth || 0;
        if (slideWidth) track.style.transform = `translateX(-${currentFeaturedIndex * slideWidth}px)`;
    }
    
    function generateInfiniteSuggestions(accounts, count = 50) {
        if (!accounts.length) return [];
        const available = accounts.filter(a => a.status !== 'sold');
        const sold = accounts.filter(a => a.status === 'sold');
        const pool = [...available, ...sold];
        if (!pool.length) return [];
        const suggestions = [];
        const minPriceRange = userProfile.priceRange?.min || 0;
        const maxPriceRange = userProfile.priceRange?.max || Infinity;
        const interestedPrice = userProfile.interestedPrice || 0;
        const interestedPlatform = userProfile.interestedPlatform || null;
        const viewedPlatforms = userProfile.viewedPlatforms || {};
        const viewedCategories = userProfile.viewedCategories || {};
        for (let i=0; i<count; i++) {
            let selected = null;
            if (Math.random() < 0.6 && userProfile.clickedAccounts && userProfile.clickedAccounts.length) {
                const scores = pool.map(acc => {
                    let score = 10;
                    if (interestedPlatform && acc.socialMedia === interestedPlatform) score += 40;
                    else if (viewedPlatforms[acc.socialMedia]) score += viewedPlatforms[acc.socialMedia] * 8;
                    if (acc.category && viewedCategories[acc.category]) score += viewedCategories[acc.category] * 6;
                    const price = acc.finalPrice || acc.originalPrice || 0;
                    if (interestedPrice && Math.abs(price - interestedPrice) < 500) score += 15;
                    if (price >= minPriceRange && price <= maxPriceRange) score += 10;
                    if (acc.status === 'available') score += 5;
                    score += Math.random() * 5;
                    return score;
                });
                selected = getWeightedRandomAccount(pool, scores);
            } else {
                const randomIndex = Math.floor(Math.random() * pool.length);
                selected = pool[randomIndex];
            }
            if (selected) suggestions.push(selected);
        }
        return suggestions;
    }
    
    function renderInfiniteSuggestions() {
        if (!allAccounts.length) return;
        const batch = generateInfiniteSuggestions(allAccounts, 40);
        const track = document.getElementById('suggestionsTrack');
        if (!track) return;
        const t = translations[currentLang];
        const items = batch.map(acc => {
            let icon = "skill-icons:instagram";
            if (acc.socialMedia?.toLowerCase() === 'instagram') icon = "skill-icons:instagram";
            else if (acc.socialMedia?.toLowerCase() === 'tiktok') icon = "logos:tiktok-icon";
            else if (acc.socialMedia?.toLowerCase() === 'youtube') icon = "logos:youtube-icon";
            else if (acc.socialMedia?.toLowerCase() === 'linkedin') icon = "logos:linkedin-icon";
            else if (acc.socialMedia?.toLowerCase() === 'x') icon = "logos:twitter";
            const soldBadge = acc.status === 'sold' ? `<span class="status-sold text-[8px] px-1.5 py-0.5 ml-1">${t.statusSold}</span>` : `<span class="status-available text-[8px] px-1.5 py-0.5 ml-1">${t.statusAvailable}</span>`;
            return `
                <div class="suggestion-item" data-id="${acc.id}">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-gray-800 rounded-xl flex items-center justify-center flex-shrink-0"><iconify-icon icon="${icon}" width="32"></iconify-icon></div>
                        <div class="flex-1 min-w-0">
                            <p class="font-semibold text-sm truncate text-white">${escapeHtml(acc.nickname || 'Unknown')}</p>
                            <div class="flex items-center flex-wrap gap-1">
                                <p class="text-xs text-gray-400">${acc.socialMedia || 'Unknown'}</p>
                                ${soldBadge}
                            </div>
                        </div>
                    </div>
                    <div class="mt-2 flex justify-between items-center">
                        <span class="font-bold text-sm text-white">$${(acc.finalPrice || acc.originalPrice || 0).toLocaleString()}</span>
                        <span class="text-xs text-gray-400">${acc.followers?.toLocaleString() || 0} followers</span>
                    </div>
                </div>
            `;
        }).join('');
        track.innerHTML = items + items;
        track.querySelectorAll('.suggestion-item').forEach(el => {
            el.addEventListener('click', () => {
                const id = el.dataset.id;
                const acc = allAccounts.find(a => a.id === id);
                if (acc) updateUserProfile(acc);
                window.location.href = `view.html?id=${id}`;
            });
        });
        track.style.animation = 'none';
        track.offsetHeight;
        track.style.animation = 'scrollSuggestions 120s linear infinite';
    }
    
    async function loadAccounts() {
        try {
            const querySnapshot = await getDocs(collection(db, 'marketplaceAccounts'));
            allAccounts = [];
            querySnapshot.forEach(doc => { allAccounts.push({ id: doc.id, ...doc.data() }); });
            const settingsDoc = await getDoc(doc(db, 'adminSettings', 'config'));
            categoriesArray = settingsDoc.exists() ? (settingsDoc.data().categories || ['Fashion', 'Tech', 'Gaming', 'Lifestyle']) : ['Fashion', 'Tech', 'Gaming', 'Lifestyle'];
            const categorySelect = document.getElementById('categoryFilter');
            if (categorySelect) categorySelect.innerHTML = '<option value="all">All Categories</option>' + categoriesArray.map(c => `<option value="${c}">${c}</option>`).join('');
            renderFeatured();
            applyFiltersAndRender();
            renderInfiniteSuggestions();
            setInterval(() => { if (allAccounts.length) { renderFeatured(); renderInfiniteSuggestions(); } }, 45000);
        } catch(e) {
            console.error("Firebase error:", e);
            document.getElementById('listings-grid').innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">Unable to load accounts. Please try again later.</div>';
        }
    }
    
    function applyFiltersAndRender() {
        const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
        const platform = document.querySelector('.platform-chip.category-active')?.getAttribute('data-platform') || 'all';
        const minPrice = parseFloat(document.getElementById('minPrice')?.value) || 0;
        const maxPrice = parseFloat(document.getElementById('maxPrice')?.value) || Infinity;
        const category = document.getElementById('categoryFilter')?.value || 'all';
        const available = allAccounts.filter(a => a.status !== 'sold');
        const sold = allAccounts.filter(a => a.status === 'sold');
        const filterFn = (acc) => {
            const matchesSearch = !searchTerm || (acc.nickname && acc.nickname.toLowerCase().includes(searchTerm)) || (acc.socialMedia && acc.socialMedia.toLowerCase().includes(searchTerm));
            const matchesPlatform = platform === 'all' || (acc.socialMedia && acc.socialMedia.toLowerCase() === platform.toLowerCase());
            const price = acc.finalPrice || acc.originalPrice || 0;
            const matchesPrice = price >= minPrice && price <= maxPrice;
            const matchesCategory = category === 'all' || acc.category === category;
            return matchesSearch && matchesPlatform && matchesPrice && matchesCategory;
        };
        let filteredAvailable = available.filter(filterFn);
        let filteredSold = sold.filter(filterFn);
        const soldToShow = [];
        for (let i=0; i<Math.min(2, filteredSold.length); i++) {
            const idx = Math.floor(Math.random() * filteredSold.length);
            soldToShow.push(filteredSold[idx]);
            filteredSold.splice(idx,1);
        }
        let combined = [...filteredAvailable, ...soldToShow];
        for (let i=combined.length-1; i>0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [combined[i], combined[j]] = [combined[j], combined[i]];
        }
        filteredAccounts = combined;
        currentPage = 1;
        renderAccounts();
    }
    
    function renderAccounts() {
        const start = (currentPage-1)*ITEMS_PER_PAGE;
        const end = start+ITEMS_PER_PAGE;
        const pageAccounts = filteredAccounts.slice(start, end);
        const totalPages = Math.ceil(filteredAccounts.length/ITEMS_PER_PAGE);
        const t = translations[currentLang];
        document.getElementById('paginationInfo').innerHTML = `Showing ${start+1}-${Math.min(end, filteredAccounts.length)} of ${filteredAccounts.length} accounts`;
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages || totalPages === 0;
        const container = document.getElementById('listings-grid');
        if (!pageAccounts.length) {
            container.innerHTML = `<div class="col-span-full text-center py-16 text-gray-500">${t.noResults}</div>`;
            return;
        }
        container.innerHTML = pageAccounts.map(acc => {
            const frontImg = acc.images?.front || 'https://placehold.co/400x600/1a1a1a/666?text=No+Image';
            const isSold = acc.status === 'sold';
            const statusText = isSold ? t.statusSold : t.statusAvailable;
            const statusClass = isSold ? 'status-sold' : 'status-available';
            return `
                <div class="movie-card" data-id="${acc.id}">
                    <div class="movie-status">
                        <span class="${statusClass} text-[10px] px-2 py-0.5">${statusText}</span>
                    </div>
                    <img src="${frontImg}" loading="lazy" onerror="this.src='https://placehold.co/400x600/1a1a1a/666?text=No+Image'">
                    <div class="movie-overlay">
                        <div class="movie-followers">
                            <iconify-icon icon="mdi:account-group-outline" width="12"></iconify-icon>
                            <span>${acc.followers?.toLocaleString() || 0}</span>
                        </div>
                        <div class="movie-platform">${acc.socialMedia || 'Social'}</div>
                    </div>
                </div>
            `;
        }).join('');
        document.querySelectorAll('.movie-card').forEach(el => {
            el.addEventListener('click', () => {
                const id = el.dataset.id;
                const acc = allAccounts.find(a => a.id === id);
                if (acc) updateUserProfile(acc);
                window.location.href = `view.html?id=${id}`;
            });
        });
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => { if (m==='&') return '&amp;'; if (m==='<') return '&lt;'; if (m==='>') return '&gt;'; return m; }); }
    
    // ==================== EVENT LISTENERS ====================
    document.getElementById('searchInput')?.addEventListener('input', () => applyFiltersAndRender());
    document.getElementById('minPrice')?.addEventListener('input', () => applyFiltersAndRender());
    document.getElementById('maxPrice')?.addEventListener('input', () => applyFiltersAndRender());
    document.getElementById('categoryFilter')?.addEventListener('change', () => applyFiltersAndRender());
    document.getElementById('prevPage')?.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderAccounts(); window.scrollTo({ top: 400, behavior: 'smooth' }); } });
    document.getElementById('nextPage')?.addEventListener('click', () => { const totalPages = Math.ceil(filteredAccounts.length / ITEMS_PER_PAGE); if (currentPage < totalPages) { currentPage++; renderAccounts(); window.scrollTo({ top: 400, behavior: 'smooth' }); } });
    
    document.querySelectorAll('.platform-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.platform-chip').forEach(c => { c.classList.remove('category-active'); c.classList.add('category-inactive'); });
            chip.classList.remove('category-inactive'); chip.classList.add('category-active');
            applyFiltersAndRender();
        });
    });
    
    document.getElementById('exploreBtn')?.addEventListener('click', () => { document.getElementById('listings-grid').scrollIntoView({ behavior: 'smooth' }); });
    
    const startSellingBtns = [document.getElementById('startSellingBtn'), document.getElementById('startSellingBtn2')];
    startSellingBtns.forEach(btn => btn?.addEventListener('click', () => { window.location.href = 'sell.html'; }));
    
    document.getElementById('trustLink')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'info.html'; });
    document.getElementById('guidelinesLink')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'info.html'; });
    document.getElementById('supportLink')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'info.html'; });
    
    document.getElementById('langSwitchBtn')?.addEventListener('click', showLanguageModal);
    
    window.addEventListener('resize', () => updateFeaturedPosition());
    
    // ==================== INITIALIZE ====================
    applyLanguage(currentLang);
    loadAccounts();
</script>
    <!-- Analytics tracking script (add this right after, still in module) -->
<script type="module">
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    // Use the db instance that was exposed globally
    const db = window.db;
    
    if (!db) {
        console.warn('Firebase not initialized yet, waiting...');
        // Wait for db to be available
        const waitForDb = setInterval(() => {
            if (window.db) {
                clearInterval(waitForDb);
                initAnalytics();
            }
        }, 100);
    } else {
        initAnalytics();
    }
    
    function initAnalytics() {
        // Generate or get session ID
        const sessionId = localStorage.getItem('analytics_session_id') || 's_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('analytics_session_id', sessionId);
        
        // Detect device and browser
        const ua = navigator.userAgent;
        let device = 'Desktop';
        if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) device = 'Tablet';
        if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/i.test(ua)) device = 'Mobile';
        
        let browser = 'Unknown';
        if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
        else if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
        else if (ua.includes('Edg')) browser = 'Edge';
        else if (ua.includes('Opera')) browser = 'Opera';
        
        // Track page view (don't await - fire and forget)
        addDoc(collection(db, 'analytics_pageViews'), {
            page: window.location.pathname,
            pageName: document.title || window.location.pathname,
            sessionId: sessionId,
            device: device,
            browser: browser,
            timestamp: serverTimestamp(),
            url: window.location.href,
            referrer: document.referrer || 'direct'
        }).catch(err => console.warn('Page view tracking error:', err));
        
        // Track clicks on elements with data-track-click attribute
        document.addEventListener('click', (e) => {
            const el = e.target.closest('[data-track-click]');
            if (el) {
                addDoc(collection(db, 'analytics_clicks'), {
                    element: el.innerText?.substring(0, 100) || el.tagName,
                    elementId: el.id || null,
                    elementClass: el.className || null,
                    elementType: el.tagName,
                    page: window.location.pathname,
                    sessionId: sessionId,
                    device: device,
                    browser: browser,
                    timestamp: serverTimestamp(),
                    url: window.location.href
                }).catch(err => console.warn('Click tracking error:', err));
            }
        });
        
        console.log('📊 Analytics tracking active for:', window.location.pathname);
    }
</script>
