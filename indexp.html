<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Social Market — Buy & Sell Social Media Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        * { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fafafc; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: white; border: 1px solid #f0f0f0; transition: all 0.2s ease; cursor: pointer; border-radius: 20px; }
        .glass-card:active { transform: scale(0.98); }
        .btn-sleek { transition: all 0.2s ease; }
        .btn-sleek:active { transform: scale(0.97); }
        .category-chip { transition: all 0.2s; cursor: pointer; }
        .category-active { background: #111111; color: white; border-color: #111111; }
        .category-inactive { background: transparent; color: #2c2c2e; border-color: #e4e4e7; }
        .original-price { text-decoration: line-through; color: #9ca3af; font-size: 12px; }
        .discount-badge { background: #10b981; color: white; font-size: 9px; padding: 2px 6px; border-radius: 20px; display: inline-block; margin-left: 6px; }
        .status-available { background: #10b981; color: white; font-size: 9px; padding: 2px 6px; border-radius: 20px; }
        .status-sold { background: #ef4444; color: white; font-size: 9px; padding: 2px 6px; border-radius: 20px; }
        
        /* Continuous infinite scrolling carousel - very slow */
        .suggestions-wrapper {
            overflow: hidden;
            position: relative;
            width: 100%;
        }
        .suggestions-track {
            display: flex;
            width: fit-content;
            animation: scrollSuggestionsSlow 280s linear infinite;
        }
        .suggestions-track:hover {
            animation-play-state: paused;
        }
        @keyframes scrollSuggestionsSlow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .suggestion-item {
            flex: 0 0 auto;
            width: 270px;
            margin-right: 14px;
            background: white;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #f0f0f0;
            transition: all 0.2s;
            cursor: pointer;
        }
        .suggestion-item:active {
            transform: scale(0.98);
        }
        
        .filter-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
            scrollbar-width: none;
        }
        .filter-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .btn-explore, .btn-sell {
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
        }
        .btn-explore:active, .btn-sell:active {
            transform: scale(0.97);
        }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="pb-20" style="overflow-x: hidden;">

<div class="px-4 py-5 max-w-md mx-auto">
    <!-- HEADER -->
    <header class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center shadow-sm">
                <iconify-icon icon="ri:exchange-dollar-line" width="22" class="text-white"></iconify-icon>
            </div>
            <div id="mobileGreeting" class="text-sm font-medium text-gray-600"></div>
        </div>
        <button id="startSellingBtnM" class="bg-black text-white px-5 py-2 rounded-full text-sm font-medium btn-sleek flex items-center gap-1 shadow-md">
            <iconify-icon icon="mdi:storefront-outline" width="16"></iconify-icon>
            Sell
        </button>
    </header>

    <!-- HERO SECTION -->
    <div class="mb-7">
        <div class="inline-flex items-center gap-1 bg-white/70 px-3 py-1 rounded-full border border-gray-200 mb-3">
            <iconify-icon icon="solar:graph-new-up-linear" width="12" class="text-emerald-600"></iconify-icon>
            <span class="text-[10px] font-medium text-gray-700">TRUSTED MARKETPLACE</span>
        </div>
        <h1 class="text-3xl font-bold tracking-tight text-gray-900 leading-tight">
            Swap & scale<br>
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600">social empires.</span>
        </h1>
        <p class="text-gray-500 text-sm mt-3 leading-relaxed">Buy or sell Instagram, TikTok, YouTube, LinkedIn & X accounts instantly.</p>
        
        <div class="flex gap-3 mt-6">
            <button id="exploreBtnM" class="btn-explore bg-black text-white flex-1 py-3 rounded-full text-sm shadow-md">
                <iconify-icon icon="mdi:cart-outline" width="18"></iconify-icon>
                Explore
            </button>
            <button id="startSellingBtnM2" class="btn-sell border border-gray-300 bg-white text-gray-800 flex-1 py-3 rounded-full text-sm hover:bg-gray-50">
                <iconify-icon icon="mdi:storefront-outline" width="18"></iconify-icon>
                Sell
            </button>
        </div>
    </div>

    <!-- Social Icons -->
    <div class="flex justify-center items-center gap-6 mb-8">
        <iconify-icon icon="skill-icons:instagram" width="24" class="text-gray-400"></iconify-icon>
        <iconify-icon icon="logos:tiktok-icon" width="24" class="text-gray-400"></iconify-icon>
        <iconify-icon icon="logos:twitter" width="24" class="text-gray-400"></iconify-icon>
        <iconify-icon icon="logos:youtube-icon" width="24" class="text-gray-400"></iconify-icon>
        <iconify-icon icon="logos:linkedin-icon" width="24" class="text-gray-400"></iconify-icon>
    </div>

    <!-- Continuous Infinite Suggestions Carousel -->
    <div class="mb-6">
        <div class="flex items-center gap-2 mb-3">
            <iconify-icon icon="mdi:lightbulb" width="16" class="text-amber-500"></iconify-icon>
            <h3 class="text-sm font-semibold text-gray-700">Suggested for you</h3>
        </div>
        <div class="suggestions-wrapper">
            <div id="suggestionsTrackM" class="suggestions-track"></div>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="mb-5">
        <div class="relative">
            <iconify-icon icon="mdi:magnify" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" width="18"></iconify-icon>
            <input type="text" id="searchInputM" placeholder="Search by nickname or platform..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:border-black focus:outline-none text-sm bg-white">
        </div>
    </div>

    <!-- Platform Filters -->
    <div class="filter-scroll mb-4">
        <div class="flex gap-2 pb-1">
            <button data-platform="all" class="platform-chip-m category-active px-4 py-1.5 rounded-full text-xs font-medium border whitespace-nowrap">All</button>
            <button data-platform="Instagram" class="platform-chip-m category-inactive px-4 py-1.5 rounded-full text-xs font-medium border whitespace-nowrap">Instagram</button>
            <button data-platform="Tiktok" class="platform-chip-m category-inactive px-4 py-1.5 rounded-full text-xs font-medium border whitespace-nowrap">TikTok</button>
            <button data-platform="Youtube" class="platform-chip-m category-inactive px-4 py-1.5 rounded-full text-xs font-medium border whitespace-nowrap">YouTube</button>
            <button data-platform="Linkedin" class="platform-chip-m category-inactive px-4 py-1.5 rounded-full text-xs font-medium border whitespace-nowrap">LinkedIn</button>
            <button data-platform="X" class="platform-chip-m category-inactive px-4 py-1.5 rounded-full text-xs font-medium border whitespace-nowrap">X (Twitter)</button>
        </div>
    </div>

    <!-- Price & Category Filters -->
    <div class="flex flex-wrap gap-3 mb-5">
        <div class="flex items-center gap-2 flex-1 bg-white rounded-xl border border-gray-200 px-3 py-2">
            <span class="text-xs text-gray-500 font-medium">$</span>
            <input type="number" id="minPriceM" placeholder="Min" class="w-full text-sm bg-transparent focus:outline-none">
        </div>
        <div class="flex items-center gap-2 flex-1 bg-white rounded-xl border border-gray-200 px-3 py-2">
            <span class="text-xs text-gray-500 font-medium">$</span>
            <input type="number" id="maxPriceM" placeholder="Max" class="w-full text-sm bg-transparent focus:outline-none">
        </div>
        <div class="flex-1 bg-white rounded-xl border border-gray-200 px-3 py-2">
            <select id="categoryFilterM" class="w-full text-sm bg-transparent focus:outline-none">
                <option value="all">All Categories</option>
            </select>
        </div>
    </div>

    <!-- Pagination -->
    <div class="flex justify-between items-center mb-4">
        <div id="paginationInfoM" class="text-xs text-gray-500"></div>
        <div class="flex gap-2">
            <button id="prevPageM" class="px-3 py-1.5 border border-gray-200 rounded-lg text-xs bg-white disabled:opacity-40">← Prev</button>
            <button id="nextPageM" class="px-3 py-1.5 border border-gray-200 rounded-lg text-xs bg-white disabled:opacity-40">Next →</button>
        </div>
    </div>

    <!-- Products Grid -->
    <div id="listings-grid-mobile" class="space-y-4 pb-16">
        <div class="text-center py-10 text-gray-400 text-sm">Loading accounts...</div>
    </div>

    <!-- Footer -->
    <footer class="pt-6 pb-4 border-t border-gray-200 mt-4">
        <div class="flex flex-wrap justify-center gap-5 text-gray-400 text-xs">
            <a href="#" id="trustLinkM" class="hover:text-gray-800 flex items-center gap-1"><iconify-icon icon="mdi:shield-check-outline" width="14"></iconify-icon> Trust</a>
            <a href="#" id="guidelinesLinkM" class="hover:text-gray-800 flex items-center gap-1"><iconify-icon icon="mdi:file-document-outline" width="14"></iconify-icon> Guidelines</a>
            <a href="#" id="supportLinkM" class="hover:text-gray-800 flex items-center gap-1"><iconify-icon icon="mdi:help-circle-outline" width="14"></iconify-icon> Support</a>
        </div>
        <div class="text-center text-gray-300 text-[10px] mt-4">
            <iconify-icon icon="ph:copyright" width="10" class="inline"></iconify-icon> 2026 Social Market
        </div>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBAJBge8NM51f7IvwaE5X1fXsC8H-0Tlv0",
        authDomain: "project-k21n.firebaseapp.com",
        projectId: "project-k21n",
        storageBucket: "project-k21n.firebasestorage.app",
        messagingSenderId: "266081318769",
        appId: "1:266081318769:web:a7893c55b5b30a8dd768d0"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let allAccounts = [];
    let categoriesArray = [];
    let currentPage = 1;
    let filteredAccounts = [];
    const ITEMS_PER_PAGE = 10;
    
    // Time-based greeting
    function getTimeBasedGreeting() {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 12) return "Good Morning!";
        if (hour >= 12 && hour < 17) return "Good Afternoon!";
        if (hour >= 17 && hour < 22) return "Good Evening!";
        return "Good Night!";
    }
    document.getElementById('mobileGreeting').innerHTML = `<iconify-icon icon="mdi:hand-wave" width="14" class="inline mr-1"></iconify-icon> ${getTimeBasedGreeting()}`;
    
    // User profile for recommendations
    let userProfile = JSON.parse(localStorage.getItem('socialMarketProfile_mobile')) || {
        viewedPlatforms: {},
        viewedCategories: {},
        priceRange: { min: 0, max: Infinity },
        clickedAccounts: [],
        interestedPlatform: null
    };
    
    function updateUserProfile(acc) {
        if (!acc) return;
        userProfile.viewedPlatforms[acc.socialMedia] = (userProfile.viewedPlatforms[acc.socialMedia] || 0) + 1;
        if (acc.category) userProfile.viewedCategories[acc.category] = (userProfile.viewedCategories[acc.category] || 0) + 1;
        const price = acc.finalPrice || acc.originalPrice || 0;
        if (price > 0) {
            if (price < userProfile.priceRange.min || userProfile.priceRange.min === 0) userProfile.priceRange.min = price;
            if (price > userProfile.priceRange.max) userProfile.priceRange.max = price;
        }
        userProfile.clickedAccounts.push({ id: acc.id, timestamp: Date.now() });
        if (userProfile.clickedAccounts.length > 20) userProfile.clickedAccounts.shift();
        
        let maxViews = 0;
        for (const [platform, count] of Object.entries(userProfile.viewedPlatforms)) {
            if (count > maxViews) { maxViews = count; userProfile.interestedPlatform = platform; }
        }
        localStorage.setItem('socialMarketProfile_mobile', JSON.stringify(userProfile));
    }
    
    function getWeightedRandom(accounts, weights) {
        const total = weights.reduce((a, b) => a + b, 0);
        let random = Math.random() * total;
        for (let i = 0; i < accounts.length; i++) {
            if (random < weights[i]) return accounts[i];
            random -= weights[i];
        }
        return accounts[0];
    }
    
    function generateSuggestions(accounts, count = 25) {
        if (!accounts.length) return [];
        const pool = [...accounts.filter(a => a.status !== 'sold'), ...accounts.filter(a => a.status === 'sold')];
        if (!pool.length) return [];
        const suggestions = [];
        for (let i = 0; i < count; i++) {
            if (Math.random() < 0.5 && userProfile.clickedAccounts.length) {
                const scores = pool.map(acc => {
                    let score = 10;
                    if (userProfile.interestedPlatform && acc.socialMedia === userProfile.interestedPlatform) score += 30;
                    else if (userProfile.viewedPlatforms[acc.socialMedia]) score += userProfile.viewedPlatforms[acc.socialMedia] * 5;
                    if (acc.category && userProfile.viewedCategories[acc.category]) score += userProfile.viewedCategories[acc.category] * 4;
                    const price = acc.finalPrice || acc.originalPrice || 0;
                    if (price >= userProfile.priceRange.min && price <= userProfile.priceRange.max) score += 8;
                    if (acc.status === 'available') score += 5;
                    score += Math.random() * 5;
                    return score;
                });
                suggestions.push(getWeightedRandom(pool, scores));
            } else {
                suggestions.push(pool[Math.floor(Math.random() * pool.length)]);
            }
        }
        return suggestions;
    }
    
    function renderSuggestions() {
        if (!allAccounts.length) return;
        const batch = generateSuggestions(allAccounts, 22);
        const track = document.getElementById('suggestionsTrackM');
        if (!track) return;
        
        const createItemHtml = (acc) => {
            let icon = "skill-icons:instagram";
            if (acc.socialMedia?.toLowerCase() === 'instagram') icon = "skill-icons:instagram";
            else if (acc.socialMedia?.toLowerCase() === 'tiktok') icon = "logos:tiktok-icon";
            else if (acc.socialMedia?.toLowerCase() === 'youtube') icon = "logos:youtube-icon";
            else if (acc.socialMedia?.toLowerCase() === 'linkedin') icon = "logos:linkedin-icon";
            else if (acc.socialMedia?.toLowerCase() === 'x') icon = "logos:twitter";
            const soldBadge = acc.status === 'sold' ? '<span class="status-sold">SOLD</span>' : '<span class="status-available">AVAIL</span>';
            return `
                <div class="suggestion-item" data-id="${acc.id}">
                    <div class="flex items-center gap-2">
                        <div class="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center flex-shrink-0">
                            <iconify-icon icon="${icon}" width="24"></iconify-icon>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-semibold text-sm truncate">${escapeHtml(acc.nickname)}</p>
                            <div class="flex items-center gap-1 flex-wrap">
                                <p class="text-xs text-gray-400">${acc.socialMedia}</p>
                                ${soldBadge}
                            </div>
                        </div>
                    </div>
                    <div class="mt-2 flex justify-between items-center">
                        <span class="font-bold text-sm">$${(acc.finalPrice || acc.originalPrice || 0).toLocaleString()}</span>
                        <div class="flex items-center gap-1">
                            <iconify-icon icon="mdi:account-group-outline" width="12" class="text-gray-400"></iconify-icon>
                            <span class="text-xs text-gray-500">${acc.followers?.toLocaleString() || 0}</span>
                        </div>
                    </div>
                </div>
            `;
        };
        
        let itemsHtml = '';
        for (let i = 0; i < 2; i++) {
            batch.forEach(acc => { itemsHtml += createItemHtml(acc); });
        }
        track.innerHTML = itemsHtml;
        
        track.querySelectorAll('.suggestion-item').forEach(el => {
            el.addEventListener('click', () => {
                const id = el.dataset.id;
                const acc = allAccounts.find(a => a.id === id);
                if (acc) updateUserProfile(acc);
                window.location.href = `view.html?id=${id}`;
            });
        });
        
        track.style.animation = 'none';
        track.offsetHeight;
        track.style.animation = 'scrollSuggestionsSlow 280s linear infinite';
    }
    
    async function loadAccounts() {
        try {
            const querySnapshot = await getDocs(collection(db, 'marketplaceAccounts'));
            allAccounts = [];
            querySnapshot.forEach(doc => {
                const data = doc.data();
                allAccounts.push({ id: doc.id, ...data });
            });
            
            const settingsDoc = await getDoc(doc(db, 'adminSettings', 'config'));
            categoriesArray = settingsDoc.exists() ? (settingsDoc.data().categories || ['Fashion', 'Tech', 'Gaming', 'Lifestyle']) : ['Fashion', 'Tech', 'Gaming', 'Lifestyle'];
            document.getElementById('categoryFilterM').innerHTML = '<option value="all">All Categories</option>' + categoriesArray.map(c => `<option value="${c}">${c}</option>`).join('');
            
            applyFilters();
            renderSuggestions();
            setInterval(() => { if (allAccounts.length) renderSuggestions(); }, 60000);
        } catch(e) {
            console.error("Error:", e);
            document.getElementById('listings-grid-mobile').innerHTML = '<div class="text-center py-10 text-gray-400 text-sm">Unable to load accounts. Please refresh.</div>';
        }
    }
    
    function applyFilters() {
        const term = document.getElementById('searchInputM')?.value.toLowerCase() || '';
        const platform = document.querySelector('.platform-chip-m.category-active')?.dataset.platform || 'all';
        const minPrice = parseFloat(document.getElementById('minPriceM')?.value) || 0;
        const maxPrice = parseFloat(document.getElementById('maxPriceM')?.value) || Infinity;
        const category = document.getElementById('categoryFilterM')?.value || 'all';
        
        const available = allAccounts.filter(a => a.status !== 'sold');
        const sold = allAccounts.filter(a => a.status === 'sold');
        
        const filterFn = (acc) => {
            const matchesSearch = !term || acc.nickname?.toLowerCase().includes(term) || acc.socialMedia?.toLowerCase().includes(term);
            const matchesPlatform = platform === 'all' || (acc.socialMedia && acc.socialMedia.toLowerCase() === platform.toLowerCase());
            const price = acc.finalPrice || acc.originalPrice || 0;
            const matchesPrice = price >= minPrice && price <= maxPrice;
            const matchesCategory = category === 'all' || acc.category === category;
            return matchesSearch && matchesPlatform && matchesPrice && matchesCategory;
        };
        
        let filteredAvailable = available.filter(filterFn);
        let filteredSold = sold.filter(filterFn);
        
        const soldToShow = [];
        for (let i = 0; i < Math.min(1, filteredSold.length) && filteredSold.length; i++) {
            soldToShow.push(filteredSold.splice(Math.floor(Math.random() * filteredSold.length), 1)[0]);
        }
        
        let combined = [...filteredAvailable, ...soldToShow];
        for (let i = combined.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [combined[i], combined[j]] = [combined[j], combined[i]];
        }
        
        filteredAccounts = combined;
        currentPage = 1;
        renderAccounts();
    }
    
    function renderAccounts() {
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        const pageAccounts = filteredAccounts.slice(start, end);
        const totalPages = Math.ceil(filteredAccounts.length / ITEMS_PER_PAGE);
        
        document.getElementById('paginationInfoM').innerHTML = `${start+1}-${Math.min(end, filteredAccounts.length)} of ${filteredAccounts.length}`;
        document.getElementById('prevPageM').disabled = currentPage === 1;
        document.getElementById('nextPageM').disabled = currentPage === totalPages || totalPages === 0;
        
        const container = document.getElementById('listings-grid-mobile');
        if (!pageAccounts.length) {
            container.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm">No accounts match your filters</div>';
            return;
        }
        
        container.innerHTML = pageAccounts.map(acc => {
            const displayPrice = acc.finalPrice || acc.originalPrice;
            const hasDiscount = acc.hasDiscount || (acc.discountPrice && !acc.bargaining);
            const acceptDiscount = acc.acceptDiscount === true;
            const isSold = acc.status === 'sold';
            
            let originalDisplay = '';
            let discountBadge = '';
            if (hasDiscount && acc.originalPrice && acc.originalPrice !== displayPrice) {
                originalDisplay = `<span class="original-price">$${acc.originalPrice?.toLocaleString()}</span>`;
            }
            if (acceptDiscount && !isSold) {
                discountBadge = '<span class="discount-badge">✔ Discount</span>';
            }
            
            let icon = "skill-icons:instagram";
            if (acc.socialMedia?.toLowerCase() === 'instagram') icon = "skill-icons:instagram";
            else if (acc.socialMedia?.toLowerCase() === 'tiktok') icon = "logos:tiktok-icon";
            else if (acc.socialMedia?.toLowerCase() === 'youtube') icon = "logos:youtube-icon";
            else if (acc.socialMedia?.toLowerCase() === 'linkedin') icon = "logos:linkedin-icon";
            else if (acc.socialMedia?.toLowerCase() === 'x') icon = "logos:twitter";
            
            const statusBadge = isSold ? '<span class="status-sold">SOLD</span>' : '<span class="status-available">AVAILABLE</span>';
            const priceHtml = acc.bargaining ? '<span class="text-xs text-gray-500">Negotiable</span>' : `<span class="text-base font-bold">$${displayPrice?.toLocaleString()}</span> ${originalDisplay} ${discountBadge}`;
            
            return `
                <div class="glass-card p-3 product-card-m" data-id="${acc.id}">
                    <div class="flex gap-3">
                        <div class="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center flex-shrink-0">
                            <iconify-icon icon="${icon}" width="28"></iconify-icon>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-semibold text-gray-800 text-sm">${escapeHtml(acc.nickname)}</h3>
                                    <div class="flex items-center gap-1 mt-0.5 flex-wrap">
                                        <span class="text-[10px] font-medium text-gray-400">${acc.socialMedia || ''}</span>
                                        ${statusBadge}
                                    </div>
                                </div>
                            </div>
                            <div class="flex justify-between items-center mt-2">
                                <div>${priceHtml}</div>
                                <button class="view-details-btn-m bg-black text-white px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1" data-id="${acc.id}">
                                    <iconify-icon icon="mdi:eye-outline" width="12"></iconify-icon> View
                                </button>
                            </div>
                            <div class="flex items-center gap-3 mt-2 pt-1 border-t border-gray-50">
                                <div class="flex items-center gap-1">
                                    <iconify-icon icon="mdi:account-group-outline" width="12" class="text-gray-400"></iconify-icon>
                                    <span class="text-xs text-gray-600">${acc.followers?.toLocaleString() || 0} followers</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.product-card-m, .view-details-btn-m').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = el.dataset.id;
                const acc = allAccounts.find(a => a.id === id);
                if (acc) updateUserProfile(acc);
                window.location.href = `view.html?id=${id}`;
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Event listeners
    document.getElementById('searchInputM')?.addEventListener('input', () => applyFilters());
    document.getElementById('minPriceM')?.addEventListener('input', () => applyFilters());
    document.getElementById('maxPriceM')?.addEventListener('input', () => applyFilters());
    document.getElementById('categoryFilterM')?.addEventListener('change', () => applyFilters());
    
    document.getElementById('prevPageM')?.addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderAccounts();
            window.scrollTo({ top: 350, behavior: 'smooth' });
        }
    });
    
    document.getElementById('nextPageM')?.addEventListener('click', () => {
        const totalPages = Math.ceil(filteredAccounts.length / ITEMS_PER_PAGE);
        if (currentPage < totalPages) {
            currentPage++;
            renderAccounts();
            window.scrollTo({ top: 350, behavior: 'smooth' });
        }
    });
    
    document.querySelectorAll('.platform-chip-m').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.platform-chip-m').forEach(c => {
                c.classList.remove('category-active');
                c.classList.add('category-inactive');
            });
            chip.classList.remove('category-inactive');
            chip.classList.add('category-active');
            applyFilters();
        });
    });
    
    document.getElementById('exploreBtnM')?.addEventListener('click', () => {
        document.getElementById('listings-grid-mobile').scrollIntoView({ behavior: 'smooth' });
    });
    
    const sellBtns = [document.getElementById('startSellingBtnM'), document.getElementById('startSellingBtnM2')];
    sellBtns.forEach(btn => btn?.addEventListener('click', () => window.location.href = 'sell.html'));
    
    document.getElementById('trustLinkM')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'info.html'; });
    document.getElementById('guidelinesLinkM')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'info.html'; });
    document.getElementById('supportLinkM')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'info.html'; });
    
    loadAccounts();
</script>
</body>
</html>
