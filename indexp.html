        if(searchInput) searchInput.placeholder = t.searchPlaceholder;
        document.getElementById('prevPageM') && (document.getElementById('prevPageM').innerHTML = t.prev);
        document.getElementById('nextPageM') && (document.getElementById('nextPageM').innerHTML = t.next);
        document.getElementById('footerTrust') && (document.getElementById('footerTrust').innerText = t.footerTrust);
        document.getElementById('footerGuidelines') && (document.getElementById('footerGuidelines').innerText = t.footerGuidelines);
        document.getElementById('footerSupport') && (document.getElementById('footerSupport').innerText = t.footerSupport);
        const minInput = document.getElementById('minPriceM');
        const maxInput = document.getElementById('maxPriceM');
        if(minInput) minInput.placeholder = t.minPlace;
        if(maxInput) maxInput.placeholder = t.maxPlace;
        const allChip = document.querySelector('[data-platform="all"]');
        if(allChip) allChip.innerText = t.all;
        const categorySelect = document.getElementById('categoryFilterM');
        if(categorySelect && categorySelect.options[0]) categorySelect.options[0].text = t.categoryAll;
        
        // Update greeting based on time
        const hour = new Date().getHours();
        let greeting = "";
        if (hour >= 5 && hour < 12) greeting = t.greetingMorning;
        else if (hour >= 12 && hour < 17) greeting = t.greetingAfternoon;
        else if (hour >= 17 && hour < 22) greeting = t.greetingEvening;
        else greeting = t.greetingNight;
        document.getElementById('mobileGreeting').innerHTML = `<iconify-icon icon="mdi:hand-wave" width="14" class="inline mr-1"></iconify-icon> ${greeting}`;
        
        // Re-render dynamic content
        if(typeof renderAccounts === 'function') renderAccounts();
        if(typeof renderSuggestions === 'function') renderSuggestions();
        if(typeof renderFeatured === 'function') renderFeatured();
    }
    
    // Compact language modal with country flags
    function showLanguageModal() {
        const existing = document.querySelector('.language-modal');
        if(existing) existing.remove();
        const modal = document.createElement('div');
        modal.className = 'language-modal';
        modal.innerHTML = `
            <div class="language-card">
                <h3>🌍 Hitamo Ururimi</h3>
                <div class="lang-option" data-lang="rw">
                    <span class="flag-icon">🇷🇼</span>
                    <span class="lang-name">Kinyarwanda</span>
                </div>
                <div class="lang-option" data-lang="en">
                    <span class="flag-icon">🇬🇧</span>
                    <span class="lang-name">English</span>
                </div>
                <div class="lang-option" data-lang="fr">
                    <span class="flag-icon">🇫🇷</span>
                    <span class="lang-name">Français</span>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelectorAll('.lang-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                const lang = opt.dataset.lang;
                applyLanguage(lang);
                modal.remove();
                // Refresh category dropdown after language change
                if(categoriesArray.length && document.getElementById('categoryFilterM')) {
                    const currentVal = document.getElementById('categoryFilterM').value;
                    const t = translations[currentLang];
                    let options = `<option value="all">${t.categoryAll}</option>`;
                    categoriesArray.forEach(c => options += `<option value="${c}">${c}</option>`);
                    document.getElementById('categoryFilterM').innerHTML = options;
                    if(currentVal !== 'all') document.getElementById('categoryFilterM').value = currentVal;
                }
                applyFilters();
            });
        });
    }
    
    // First time visit: show language modal immediately
    if(!localStorage.getItem('socialMarketLang')) {
        setTimeout(() => showLanguageModal(), 100);
    } else {
        applyLanguage(localStorage.getItem('socialMarketLang'));
    }
    
    // Language switcher button on header (emoji)
    const langBtn = document.getElementById('langSwitchBtnHeader');
    if(langBtn) langBtn.addEventListener('click', () => showLanguageModal());
    
    // ==================== ORIGINAL APP LOGIC (unchanged functionality) ====================
    let userProfile = JSON.parse(localStorage.getItem('socialMarketProfile_mobile')) || {
        viewedPlatforms: {},
        viewedCategories: {},
        priceRange: { min: 0, max: Infinity },
        clickedAccounts: [],
        interestedPlatform: null
    };
    
    function updateUserProfile(acc) {
        if (!acc) return;
        userProfile.viewedPlatforms[acc.socialMedia] = (userProfile.viewedPlatforms[acc.socialMedia] || 0) + 1;
        if (acc.category) userProfile.viewedCategories[acc.category] = (userProfile.viewedCategories[acc.category] || 0) + 1;
        const price = acc.finalPrice || acc.originalPrice || 0;
        if (price > 0) {
            if (price < userProfile.priceRange.min || userProfile.priceRange.min === 0) userProfile.priceRange.min = price;
            if (price > userProfile.priceRange.max) userProfile.priceRange.max = price;
        }
        userProfile.clickedAccounts.push({ id: acc.id, timestamp: Date.now() });
        if (userProfile.clickedAccounts.length > 20) userProfile.clickedAccounts.shift();
        let maxViews = 0;
        for (const [platform, count] of Object.entries(userProfile.viewedPlatforms)) {
            if (count > maxViews) { maxViews = count; userProfile.interestedPlatform = platform; }
        }
        localStorage.setItem('socialMarketProfile_mobile', JSON.stringify(userProfile));
    }
    
    function getWeightedRandom(accounts, weights) {
        const total = weights.reduce((a, b) => a + b, 0);
        let random = Math.random() * total;
        for (let i = 0; i < accounts.length; i++) {
            if (random < weights[i]) return accounts[i];
            random -= weights[i];
        }
        return accounts[0];
    }
    
    function getFeaturedAccounts(accounts, count = 12) {
        if (!accounts.length) return [];
        let eligible = accounts.filter(a => a.status !== 'sold' && a.images?.front);
        if (!eligible.length) return [];
        eligible.sort((a, b) => {
            const dateA = a.createdAt ? new Date(a.createdAt).getTime() : 0;
            const dateB = b.createdAt ? new Date(b.createdAt).getTime() : 0;
            return dateB - dateA;
        });
        const topRecent = eligible.slice(0, 30);
        for (let i = topRecent.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [topRecent[i], topRecent[j]] = [topRecent[j], topRecent[i]];
        }
        return topRecent.slice(0, count);
    }
    
    function renderFeatured() {
        if (!allAccounts.length) return;
        featuredAccounts = getFeaturedAccounts(allAccounts, 12);
        const track = document.getElementById('featuredTrack');
        if (!track) return;
        track.innerHTML = featuredAccounts.map(acc => `
            <div class="featured-item" data-id="${acc.id}">
                <img src="${acc.images?.front || 'https://placehold.co/400x800/1a1a1a/666?text=No+Image'}" class="featured-image" onerror="this.src='https://placehold.co/400x800/1a1a1a/666?text=Image+Error'">
                <div class="featured-followers">
                    <iconify-icon icon="mdi:account-group-outline" width="14"></iconify-icon>
                    ${acc.followers?.toLocaleString() || 0}
                </div>
            </div>
        `).join('');
        track.querySelectorAll('.featured-item').forEach(el => {
            el.addEventListener('click', () => {
                const id = el.dataset.id;
                if (id) window.location.href = `view.html?id=${id}`;
            });
        });
        currentFeaturedIndex = 0;
        updateFeaturedPosition();
        if (featuredInterval) clearInterval(featuredInterval);
        featuredInterval = setInterval(() => {
            if (featuredAccounts.length > 1) {
                currentFeaturedIndex = (currentFeaturedIndex + 1) % featuredAccounts.length;
                updateFeaturedPosition();
            }
        }, 2000);
    }
    
    function updateFeaturedPosition() {
        const track = document.getElementById('featuredTrack');
        if (!track || featuredAccounts.length === 0) return;
        const slideWidth = track.children[0]?.offsetWidth || 0;
        if (slideWidth) track.style.transform = `translateX(-${currentFeaturedIndex * slideWidth}px)`;
    }
    
    function generateSuggestions(accounts, count = 25) {
        if (!accounts.length) return [];
        const pool = [...accounts.filter(a => a.status !== 'sold'), ...accounts.filter(a => a.status === 'sold')];
        if (!pool.length) return [];
        const suggestions = [];
        for (let i = 0; i < count; i++) {
            if (Math.random() < 0.5 && userProfile.clickedAccounts.length) {
                const scores = pool.map(acc => {
                    let score = 10;
                    if (userProfile.interestedPlatform && acc.socialMedia === userProfile.interestedPlatform) score += 30;
                    else if (userProfile.viewedPlatforms[acc.socialMedia]) score += userProfile.viewedPlatforms[acc.socialMedia] * 5;
                    if (acc.category && userProfile.viewedCategories[acc.category]) score += userProfile.viewedCategories[acc.category] * 4;
                    const price = acc.finalPrice || acc.originalPrice || 0;
                    if (price >= userProfile.priceRange.min && price <= userProfile.priceRange.max) score += 8;
                    if (acc.status === 'available') score += 5;
                    score += Math.random() * 5;
                    return score;
                });
                suggestions.push(getWeightedRandom(pool, scores));
            } else {
                suggestions.push(pool[Math.floor(Math.random() * pool.length)]);
            }
        }
        return suggestions;
    }
    
    function renderSuggestions() {
        if (!allAccounts.length) return;
        const batch = generateSuggestions(allAccounts, 22);
        const track = document.getElementById('suggestionsTrackM');
        if (!track) return;
        const t = translations[currentLang] || translations.rw;
        const createItemHtml = (acc) => {
            let icon = "skill-icons:instagram";
            if (acc.socialMedia?.toLowerCase() === 'instagram') icon = "skill-icons:instagram";
            else if (acc.socialMedia?.toLowerCase() === 'tiktok') icon = "logos:tiktok-icon";
            else if (acc.socialMedia?.toLowerCase() === 'youtube') icon = "logos:youtube-icon";
            else if (acc.socialMedia?.toLowerCase() === 'linkedin') icon = "logos:linkedin-icon";
            else if (acc.socialMedia?.toLowerCase() === 'x') icon = "logos:twitter";
            const soldBadge = acc.status === 'sold' ? `<span class="status-sold">${t.statusSold}</span>` : `<span class="status-available">${t.statusAvailable}</span>`;
            return `
                <div class="suggestion-item" data-id="${acc.id}">
                    <div class="flex items-center gap-2">
                        <div class="w-10 h-10 bg-gray-800 rounded-xl flex items-center justify-center flex-shrink-0">
                            <iconify-icon icon="${icon}" width="24"></iconify-icon>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-semibold text-sm truncate text-white">${escapeHtml(acc.nickname)}</p>
                            <div class="flex items-center gap-1 flex-wrap">
                                <p class="text-xs text-gray-400">${acc.socialMedia}</p>
                                ${soldBadge}
                            </div>
                        </div>
                    </div>
                    <div class="mt-2 flex justify-between items-center">
                        <span class="font-bold text-sm text-white">$${(acc.finalPrice || acc.originalPrice || 0).toLocaleString()}</span>
                        <div class="flex items-center gap-1">
                            <iconify-icon icon="mdi:account-group-outline" width="12" class="text-gray-500"></iconify-icon>
                            <span class="text-xs text-gray-400">${acc.followers?.toLocaleString() || 0}</span>
                        </div>
                    </div>
                </div>
            `;
        };
        let itemsHtml = '';
        for (let i = 0; i < 2; i++) {
            batch.forEach(acc => { itemsHtml += createItemHtml(acc); });
        }
        track.innerHTML = itemsHtml;
        track.querySelectorAll('.suggestion-item').forEach(el => {
            el.addEventListener('click', () => {
                const id = el.dataset.id;
                const acc = allAccounts.find(a => a.id === id);
                if (acc) updateUserProfile(acc);
                window.location.href = `view.html?id=${id}`;
            });
        });
        track.style.animation = 'none';
        track.offsetHeight;
        track.style.animation = 'scrollSuggestions 60s linear infinite';
    }
    
    async function loadAccounts() {
        try {
            const querySnapshot = await getDocs(collection(db, 'marketplaceAccounts'));
            allAccounts = [];
            querySnapshot.forEach(doc => {
                const data = doc.data();
                allAccounts.push({ id: doc.id, ...data });
            });
            const settingsDoc = await getDoc(doc(db, 'adminSettings', 'config'));
            categoriesArray = settingsDoc.exists() ? (settingsDoc.data().categories || ['Fashion', 'Tech', 'Gaming', 'Lifestyle']) : ['Fashion', 'Tech', 'Gaming', 'Lifestyle'];
            const t = translations[currentLang] || translations.rw;
            document.getElementById('categoryFilterM').innerHTML = `<option value="all">${t.categoryAll}</option>` + categoriesArray.map(c => `<option value="${c}">${c}</option>`).join('');
            renderFeatured();
            applyFilters();
            renderSuggestions();
            setInterval(() => { if (allAccounts.length) { renderFeatured(); renderSuggestions(); } }, 45000);
        } catch(e) {
            console.error("Error:", e);
            document.getElementById('listings-grid-mobile').innerHTML = '<div class="text-center py-10 text-gray-500 text-sm">Unable to load accounts. Please refresh.</div>';
        }
    }
    
    function applyFilters() {
        const term = document.getElementById('searchInputM')?.value.toLowerCase() || '';
        const platform = document.querySelector('.platform-chip-m.category-active')?.dataset.platform || 'all';
        const minPrice = parseFloat(document.getElementById('minPriceM')?.value) || 0;
        const maxPrice = parseFloat(document.getElementById('maxPriceM')?.value) || Infinity;
        const category = document.getElementById('categoryFilterM')?.value || 'all';
        
        const available = allAccounts.filter(a => a.status !== 'sold');
        const sold = allAccounts.filter(a => a.status === 'sold');
        
        const filterFn = (acc) => {
            const matchesSearch = !term || acc.nickname?.toLowerCase().includes(term) || acc.socialMedia?.toLowerCase().includes(term);
            const matchesPlatform = platform === 'all' || (acc.socialMedia && acc.socialMedia.toLowerCase() === platform.toLowerCase());
            const price = acc.finalPrice || acc.originalPrice || 0;
            const matchesPrice = price >= minPrice && price <= maxPrice;
            const matchesCategory = category === 'all' || acc.category === category;
            return matchesSearch && matchesPlatform && matchesPrice && matchesCategory;
        };
        
        let filteredAvailable = available.filter(filterFn);
        let filteredSold = sold.filter(filterFn);
        
        const soldToShow = [];
        for (let i = 0; i < Math.min(1, filteredSold.length) && filteredSold.length; i++) {
            soldToShow.push(filteredSold.splice(Math.floor(Math.random() * filteredSold.length), 1)[0]);
        }
        
        let combined = [...filteredAvailable, ...soldToShow];
        for (let i = combined.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [combined[i], combined[j]] = [combined[j], combined[i]];
        }
        
        filteredAccounts = combined;
        currentPage = 1;
        renderAccounts();
    }
    
    function renderAccounts() {
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        const pageAccounts = filteredAccounts.slice(start, end);
        const totalPages = Math.ceil(filteredAccounts.length / ITEMS_PER_PAGE);
        const t = translations[currentLang] || translations.rw;
        
        document.getElementById('paginationInfoM').innerHTML = `${start+1}-${Math.min(end, filteredAccounts.length)} ${t.of} ${filteredAccounts.length}`;
        document.getElementById('prevPageM').disabled = currentPage === 1;
        document.getElementById('nextPageM').disabled = currentPage === totalPages || totalPages === 0;
        
        const container = document.getElementById('listings-grid-mobile');
        if (!pageAccounts.length) {
            container.innerHTML = `<div class="col-span-2 text-center py-10 text-gray-500 text-sm">${t.noResults}</div>`;
            return;
        }
        
        container.innerHTML = pageAccounts.map(acc => {
            const isSold = acc.status === 'sold';
            const statusClass = isSold ? 'status-sold' : 'status-available';
            const statusText = isSold ? t.statusSold : t.statusAvailable;
            const frontImg = acc.images?.front || 'https://placehold.co/400x600/1a1a1a/666?text=No+Image';
            return `
                <div class="movie-card" data-id="${acc.id}">
                    <div class="movie-status">
                        <span class="${statusClass} text-[10px] px-2 py-0.5">${statusText}</span>
                    </div>
                    <img src="${frontImg}" loading="lazy" onerror="this.src='https://placehold.co/400x600/1a1a1a/666?text=No+Image'">
                    <div class="movie-overlay">
                        <div class="movie-followers">
                            <iconify-icon icon="mdi:account-group-outline" width="12"></iconify-icon>
                            <span>${acc.followers?.toLocaleString() || 0}</span>
                        </div>
                        <div class="font-medium text-white text-sm my-1">$${(acc.finalPrice || acc.originalPrice || 0).toLocaleString()}</div>
                        <div class="movie-platform">${acc.socialMedia || 'Social'}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.movie-card').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = el.dataset.id;
                const acc = allAccounts.find(a => a.id === id);
                if (acc) updateUserProfile(acc);
                window.location.href = `view.html?id=${id}`;
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Event listeners
    document.getElementById('searchInputM')?.addEventListener('input', () => applyFilters());
    document.getElementById('minPriceM')?.addEventListener('input', () => applyFilters());
    document.getElementById('maxPriceM')?.addEventListener('input', () => applyFilters());
    document.getElementById('categoryFilterM')?.addEventListener('change', () => applyFilters());
    
    document.getElementById('prevPageM')?.addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderAccounts();
            window.scrollTo({ top: 350, behavior: 'smooth' });
        }
    });
    
    document.getElementById('nextPageM')?.addEventListener('click', () => {
        const totalPages = Math.ceil(filteredAccounts.length / ITEMS_PER_PAGE);
        if (currentPage < totalPages) {
            currentPage++;
            renderAccounts();
            window.scrollTo({ top: 350, behavior: 'smooth' });
        }
    });
    
    document.querySelectorAll('.platform-chip-m').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.platform-chip-m').forEach(c => {
                c.classList.remove('category-active');
                c.classList.add('category-inactive');
            });
            chip.classList.remove('category-inactive');
            chip.classList.add('category-active');
            applyFilters();
        });
    });
    
    document.getElementById('exploreBtnM')?.addEventListener('click', () => {
        document.getElementById('listings-grid-mobile').scrollIntoView({ behavior: 'smooth' });
    });
    
    const sellBtns = [document.getElementById('startSellingBtnM'), document.getElementById('startSellingBtnM2')];
    sellBtns.forEach(btn => btn?.addEventListener('click', () => window.location.href = 'sell.html'));
    
    document.getElementById('trustLinkM')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'info.html'; });
    document.getElementById('guidelinesLinkM')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'info.html'; });
    document.getElementById('supportLinkM')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href = 'info.html'; });
    
    window.addEventListener('resize', () => updateFeaturedPosition());
    
    loadAccounts();
</script>
</body>
</html>
