<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Browse Accounts — Social Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: #f7f9fc; }
        .account-card { background: white; border-radius: 24px; border: 1px solid #eef2f6; transition: all 0.25s ease; cursor: pointer; overflow: hidden; }
        .account-card:hover { transform: translateY(-4px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1); border-color: #e0e0e0; }
        .category-chip { transition: all 0.2s; cursor: pointer; }
        .category-active { background: #111111; color: white; border-color: #111111; }
        .category-inactive { background: transparent; color: #2c2c2e; border-color: #e4e4e7; }
        .category-inactive:hover { background: #f4f4f6; border-color: #c7c9ce; }
        .status-available { background: #10b98120; color: #10b981; font-size: 10px; padding: 3px 10px; border-radius: 30px; font-weight: 500; }
        .status-sold { background: #ef444420; color: #ef4444; font-size: 10px; padding: 3px 10px; border-radius: 30px; font-weight: 500; }
        .original-price { text-decoration: line-through; color: #9ca3af; font-size: 12px; }
        .discount-badge { background: #10b981; color: white; font-size: 9px; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-left: 6px; }
        .filter-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; scrollbar-width: thin; }
        .filter-scroll::-webkit-scrollbar { height: 3px; }
        .pagination-btn { transition: all 0.2s; }
        .pagination-btn:hover:not(:disabled) { background: #111111; color: white; }
        .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        @media (max-width: 768px) {
            .account-card { border-radius: 20px; }
        }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 12px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

<div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="flex flex-wrap justify-between items-center gap-4 mb-8 pb-4 border-b border-gray-200">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center shadow-sm">
                <iconify-icon icon="ri:exchange-dollar-line" width="22" class="text-white"></iconify-icon>
            </div>
            <h1 class="text-xl md:text-2xl font-bold text-gray-800">Browse Accounts</h1>
        </div>
        <a href="index.html" class="text-gray-500 hover:text-black transition flex items-center gap-1 text-sm">
            <iconify-icon icon="mdi:home" width="16"></iconify-icon> Back to Home
        </a>
    </div>

    <!-- Search & Filters -->
    <div class="bg-white rounded-2xl p-5 mb-8 shadow-sm border border-gray-100">
        <div class="relative mb-5">
            <iconify-icon icon="mdi:magnify" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" width="18"></iconify-icon>
            <input type="text" id="searchInput" placeholder="Search by nickname, platform, or ID..." class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:border-black focus:outline-none transition text-sm">
        </div>
        
        <div class="filter-scroll mb-4">
            <div class="flex gap-2 pb-1">
                <button data-platform="all" class="platform-chip category-active px-4 py-1.5 rounded-full text-sm font-medium border whitespace-nowrap">All Platforms</button>
                <button data-platform="Instagram" class="platform-chip category-inactive px-4 py-1.5 rounded-full text-sm font-medium border whitespace-nowrap">Instagram</button>
                <button data-platform="Tiktok" class="platform-chip category-inactive px-4 py-1.5 rounded-full text-sm font-medium border whitespace-nowrap">TikTok</button>
                <button data-platform="Youtube" class="platform-chip category-inactive px-4 py-1.5 rounded-full text-sm font-medium border whitespace-nowrap">YouTube</button>
                <button data-platform="Linkedin" class="platform-chip category-inactive px-4 py-1.5 rounded-full text-sm font-medium border whitespace-nowrap">LinkedIn</button>
                <button data-platform="X" class="platform-chip category-inactive px-4 py-1.5 rounded-full text-sm font-medium border whitespace-nowrap">X (Twitter)</button>
            </div>
        </div>
        
        <div class="flex flex-wrap gap-4">
            <div class="flex items-center gap-3 flex-1 min-w-[140px]">
                <span class="text-xs text-gray-500 font-medium">Price:</span>
                <input type="number" id="minPrice" placeholder="Min $" class="w-24 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-black">
                <span class="text-gray-400">-</span>
                <input type="number" id="maxPrice" placeholder="Max $" class="w-24 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-black">
            </div>
            <div class="flex items-center gap-2 flex-1 min-w-[160px]">
                <span class="text-xs text-gray-500 font-medium">Category:</span>
                <select id="categoryFilter" class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:border-black">
                    <option value="all">All Categories</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs text-gray-500 font-medium">Status:</span>
                <select id="statusFilter" class="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:border-black">
                    <option value="all">All</option>
                    <option value="available">Available Only</option>
                    <option value="sold">Sold Only</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Results Count & Pagination -->
    <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
        <div id="resultsInfo" class="text-sm text-gray-500">Loading accounts...</div>
        <div class="flex gap-2">
            <button id="prevPage" class="pagination-btn px-4 py-2 border border-gray-200 rounded-xl text-sm bg-white disabled:opacity-40">← Previous</button>
            <button id="nextPage" class="pagination-btn px-4 py-2 border border-gray-200 rounded-xl text-sm bg-white">Next →</button>
        </div>
    </div>

    <!-- Accounts Grid -->
    <div id="accountsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-12">
        <!-- Skeleton Loaders -->
        <div class="skeleton h-64 rounded-2xl"></div>
        <div class="skeleton h-64 rounded-2xl"></div>
        <div class="skeleton h-64 rounded-2xl"></div>
        <div class="skeleton h-64 rounded-2xl"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBAJBge8NM51f7IvwaE5X1fXsC8H-0Tlv0",
        authDomain: "project-k21n.firebaseapp.com",
        projectId: "project-k21n",
        storageBucket: "project-k21n.firebasestorage.app",
        messagingSenderId: "266081318769",
        appId: "1:266081318769:web:a7893c55b5b30a8dd768d0"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let allAccounts = [];
    let categoriesArray = [];
    let currentPage = 1;
    let filteredAccounts = [];
    const ITEMS_PER_PAGE = 16;
    
    async function loadAccounts() {
        try {
            const querySnapshot = await getDocs(collection(db, 'marketplaceAccounts'));
            allAccounts = [];
            querySnapshot.forEach(doc => {
                const data = doc.data();
                allAccounts.push({ id: doc.id, ...data });
            });
            
            const settingsDoc = await getDoc(doc(db, 'adminSettings', 'config'));
            categoriesArray = settingsDoc.exists() ? (settingsDoc.data().categories || ['Fashion', 'Tech', 'Gaming', 'Lifestyle']) : ['Fashion', 'Tech', 'Gaming', 'Lifestyle'];
            document.getElementById('categoryFilter').innerHTML = '<option value="all">All Categories</option>' + categoriesArray.map(c => `<option value="${c}">${c}</option>`).join('');
            
            applyFilters();
        } catch(e) {
            console.error("Error loading accounts:", e);
            document.getElementById('accountsGrid').innerHTML = '<div class="col-span-full text-center py-16 text-gray-400">Unable to load accounts. Please refresh the page.</div>';
            document.getElementById('resultsInfo').innerText = 'Error loading accounts';
        }
    }
    
    function applyFilters() {
        const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
        const platform = document.querySelector('.platform-chip.category-active')?.dataset.platform || 'all';
        const minPrice = parseFloat(document.getElementById('minPrice')?.value) || 0;
        const maxPrice = parseFloat(document.getElementById('maxPrice')?.value) || Infinity;
        const category = document.getElementById('categoryFilter')?.value || 'all';
        const status = document.getElementById('statusFilter')?.value || 'all';
        
        const filterFn = (acc) => {
            const matchesSearch = !searchTerm || 
                acc.nickname?.toLowerCase().includes(searchTerm) || 
                acc.socialMedia?.toLowerCase().includes(searchTerm) ||
                acc.id?.toLowerCase().includes(searchTerm);
            const matchesPlatform = platform === 'all' || (acc.socialMedia && acc.socialMedia.toLowerCase() === platform.toLowerCase());
            const price = acc.finalPrice || acc.originalPrice || 0;
            const matchesPrice = price >= minPrice && price <= maxPrice;
            const matchesCategory = category === 'all' || acc.category === category;
            const matchesStatus = status === 'all' || 
                (status === 'available' && acc.status !== 'sold') || 
                (status === 'sold' && acc.status === 'sold');
            return matchesSearch && matchesPlatform && matchesPrice && matchesCategory && matchesStatus;
        };
        
        filteredAccounts = allAccounts.filter(filterFn);
        currentPage = 1;
        renderAccounts();
    }
    
    function renderAccounts() {
        const totalPages = Math.ceil(filteredAccounts.length / ITEMS_PER_PAGE);
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        const pageAccounts = filteredAccounts.slice(start, end);
        
        // Update results info
        const startNum = filteredAccounts.length === 0 ? 0 : start + 1;
        const endNum = Math.min(end, filteredAccounts.length);
        document.getElementById('resultsInfo').innerHTML = `Showing ${startNum}-${endNum} of ${filteredAccounts.length} accounts`;
        
        // Update pagination buttons
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages || totalPages === 0;
        
        const container = document.getElementById('accountsGrid');
        if (pageAccounts.length === 0) {
            container.innerHTML = `
                <div class="col-span-full text-center py-16">
                    <iconify-icon icon="mdi:account-search" width="48" class="text-gray-300 mx-auto mb-3"></iconify-icon>
                    <p class="text-gray-400">No accounts match your filters</p>
                    <button id="clearFiltersBtn" class="mt-3 text-sm text-black underline">Clear all filters</button>
                </div>
            `;
            const clearBtn = document.getElementById('clearFiltersBtn');
            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    document.getElementById('searchInput').value = '';
                    document.getElementById('minPrice').value = '';
                    document.getElementById('maxPrice').value = '';
                    document.getElementById('statusFilter').value = 'all';
                    document.getElementById('categoryFilter').value = 'all';
                    document.querySelectorAll('.platform-chip').forEach(c => {
                        c.classList.remove('category-active');
                        c.classList.add('category-inactive');
                    });
                    document.querySelector('.platform-chip[data-platform="all"]').classList.remove('category-inactive');
                    document.querySelector('.platform-chip[data-platform="all"]').classList.add('category-active');
                    applyFilters();
                });
            }
            return;
        }
        
        container.innerHTML = pageAccounts.map(acc => {
            const displayPrice = acc.finalPrice || acc.originalPrice;
            const hasDiscount = acc.hasDiscount || (acc.discountPrice && !acc.bargaining);
            const acceptDiscount = acc.acceptDiscount === true;
            const isSold = acc.status === 'sold';
            
            let originalDisplay = '';
            let discountBadge = '';
            if (hasDiscount && acc.originalPrice && acc.originalPrice !== displayPrice) {
                originalDisplay = `<span class="original-price">$${acc.originalPrice?.toLocaleString()}</span>`;
            }
            if (acceptDiscount && !isSold) {
                discountBadge = '<span class="discount-badge">✔ Discount</span>';
            }
            
            let icon = "skill-icons:instagram";
            if (acc.socialMedia?.toLowerCase() === 'instagram') icon = "skill-icons:instagram";
            else if (acc.socialMedia?.toLowerCase() === 'tiktok') icon = "logos:tiktok-icon";
            else if (acc.socialMedia?.toLowerCase() === 'youtube') icon = "logos:youtube-icon";
            else if (acc.socialMedia?.toLowerCase() === 'linkedin') icon = "logos:linkedin-icon";
            else if (acc.socialMedia?.toLowerCase() === 'x') icon = "logos:twitter";
            
            const statusBadge = isSold ? '<span class="status-sold">SOLD</span>' : '<span class="status-available">AVAILABLE</span>';
            const priceHtml = acc.bargaining ? 
                '<span class="text-sm text-gray-500">Negotiable</span>' : 
                `<span class="text-lg font-bold">$${displayPrice?.toLocaleString()}</span> ${originalDisplay} ${discountBadge}`;
            
            const profileImg = acc.images?.profile || null;
            
            return `
                <div class="account-card p-4" data-id="${acc.id}">
                    <div class="flex items-start gap-3 mb-3">
                        ${profileImg && !isSold ? 
                            `<img src="${profileImg}" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm">` : 
                            `<div class="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center"><iconify-icon icon="${icon}" width="28"></iconify-icon></div>`
                        }
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold text-gray-800 text-base truncate">${escapeHtml(acc.nickname)}</h3>
                            <div class="flex items-center gap-2 mt-0.5 flex-wrap">
                                <span class="text-[11px] font-medium text-gray-400">${acc.socialMedia || ''}</span>
                                ${statusBadge}
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mb-3 text-sm">
                        <div class="flex items-center gap-1">
                            <iconify-icon icon="mdi:account-group-outline" width="14" class="text-gray-400"></iconify-icon>
                            <span class="text-gray-700">${acc.followers?.toLocaleString() || 0} followers</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <iconify-icon icon="mdi:trending-up" width="14" class="text-emerald-500"></iconify-icon>
                            <span class="text-gray-700">${acc.engagement || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t border-gray-100">
                        <div>${priceHtml}</div>
                        <button class="view-btn bg-black text-white px-3 py-1.5 rounded-xl text-xs font-medium flex items-center gap-1" data-id="${acc.id}">
                            <iconify-icon icon="mdi:eye-outline" width="14"></iconify-icon> View Details
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        
        // Add click handlers
        document.querySelectorAll('.account-card, .view-btn').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = el.getAttribute('data-id');
                if (id) {
                    // Update user profile for recommendations
                    const account = allAccounts.find(a => a.id === id);
                    if (account) updateUserProfile(account);
                    window.location.href = `view.html?id=${id}`;
                }
            });
        });
    }
    
    function updateUserProfile(account) {
        let profile = JSON.parse(localStorage.getItem('socialMarketProfile')) || {
            viewedPlatforms: {},
            viewedCategories: {},
            clickedAccounts: []
        };
        profile.viewedPlatforms[account.socialMedia] = (profile.viewedPlatforms[account.socialMedia] || 0) + 1;
        if (account.category) profile.viewedCategories[account.category] = (profile.viewedCategories[account.category] || 0) + 1;
        profile.clickedAccounts.push({ id: account.id, timestamp: Date.now() });
        if (profile.clickedAccounts.length > 20) profile.clickedAccounts.shift();
        localStorage.setItem('socialMarketProfile', JSON.stringify(profile));
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Event Listeners
    document.getElementById('searchInput')?.addEventListener('input', () => applyFilters());
    document.getElementById('minPrice')?.addEventListener('input', () => applyFilters());
    document.getElementById('maxPrice')?.addEventListener('input', () => applyFilters());
    document.getElementById('categoryFilter')?.addEventListener('change', () => applyFilters());
    document.getElementById('statusFilter')?.addEventListener('change', () => applyFilters());
    
    document.getElementById('prevPage')?.addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderAccounts();
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }
    });
    
    document.getElementById('nextPage')?.addEventListener('click', () => {
        const totalPages = Math.ceil(filteredAccounts.length / ITEMS_PER_PAGE);
        if (currentPage < totalPages) {
            currentPage++;
            renderAccounts();
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }
    });
    
    document.querySelectorAll('.platform-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.platform-chip').forEach(c => {
                c.classList.remove('category-active');
                c.classList.add('category-inactive');
            });
            chip.classList.remove('category-inactive');
            chip.classList.add('category-active');
            applyFilters();
        });
    });
    
    loadAccounts();
</script>
</body>
</html>
